// ═══════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════
const COLORS={default:'#1e3058',comparing:'#ffc107',swapped:'#ff4081',sorted:'#00e676',pivot:'#ce93d8'};

function initSort(id){
  const n=Math.min(60,Math.max(5,+(document.getElementById('ctrl-size')||{value:30}).value||30));
  state.arr=Array.from({length:n},()=>Math.floor(Math.random()*90)+10);
  state.states=state.arr.map(()=>({color:COLORS.default}));
  state.steps=genSortSteps(id,[...state.arr]);state.stepIdx=0;
  state.renderFn=fr=>renderSort(fr.arr,fr.states);
  renderSort(state.arr,state.states);setStatus('Ready');
}
function renderSort(arr,states){
  const cv=getCanvas(700,320);const ctx=cv.getContext('2d');
  const n=arr.length,W=cv.width,H=cv.height,pad=14;
  const bw=Math.max(2,(W-2*pad)/n-2);
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,W,H);
  const maxV=Math.max(...arr);
  arr.forEach((v,i)=>{
    const bh=(v/maxV)*(H-36),x=pad+i*(bw+2),y=H-bh-8;
    ctx.fillStyle=states[i].color;
    ctx.beginPath();ctx.roundRect(x,y,bw,bh,2);ctx.fill();
    if(n<=40&&bw>8){
      ctx.fillStyle='#fff';ctx.font=`bold ${bw>18?11:9}px Fira Code`;ctx.textAlign='center';
      if(bh>20)ctx.fillText(v,x+bw/2,y+13);else ctx.fillText(v,x+bw/2,y-4);
    }
  });
}
function* bubbleSortGen(arr){
  const n=arr.length;const s=arr.map(()=>({color:COLORS.default}));
  for(let i=0;i<n;i++){let sw=false;
    for(let j=0;j<n-i-1;j++){
      s[j].color=COLORS.comparing;s[j+1].color=COLORS.comparing;
      yield{arr:[...arr],states:s.map(x=>({...x})),code:[4,5]};
      if(arr[j]>arr[j+1]){[arr[j],arr[j+1]]=[arr[j+1],arr[j]];sw=true;s[j].color=COLORS.swapped;s[j+1].color=COLORS.swapped;yield{arr:[...arr],states:s.map(x=>({...x})),code:[6,7,8]};}
      s[j].color=COLORS.default;s[j+1].color=COLORS.default;
    }
    s[n-1-i].color=COLORS.sorted;if(!sw)break;
  }
  s.forEach(x=>x.color=COLORS.sorted);yield{arr:[...arr],states:s.map(x=>({...x})),code:[]};
}
function* mergeSortGen(arr){
  const s=arr.map(()=>({color:COLORS.default}));
  function* ms(a,lo,hi){
    if(lo>=hi)return;const mid=Math.floor((lo+hi)/2);
    yield* ms(a,lo,mid);yield* ms(a,mid+1,hi);
    const L=a.slice(lo,mid+1),R=a.slice(mid+1,hi+1);let i=0,j=0,k=lo;
    while(i<L.length&&j<R.length){s[k].color=COLORS.comparing;if(L[i]<=R[j])a[k++]=L[i++];else a[k++]=R[j++];yield{arr:[...a],states:s.map(x=>({...x})),code:[9,10,11]};s[k-1].color=COLORS.sorted;}
    while(i<L.length){a[k++]=L[i++];s[k-1].color=COLORS.sorted;yield{arr:[...a],states:s.map(x=>({...x})),code:[12]};}
    while(j<R.length){a[k++]=R[j++];s[k-1].color=COLORS.sorted;yield{arr:[...a],states:s.map(x=>({...x})),code:[12]};}
  }
  yield* ms(arr,0,arr.length-1);
  s.forEach(x=>x.color=COLORS.sorted);yield{arr:[...arr],states:s.map(x=>({...x})),code:[]};
}
function* quickSortGen(arr){
  const s=arr.map(()=>({color:COLORS.default}));
  function* qs(a,lo,hi){
    if(lo>=hi)return;s[hi].color=COLORS.pivot;yield{arr:[...a],states:s.map(x=>({...x})),code:[7]};
    let i=lo-1;
    for(let j=lo;j<hi;j++){
      s[j].color=COLORS.comparing;yield{arr:[...a],states:s.map(x=>({...x})),code:[9]};
      if(a[j]<=a[hi]){i++;[a[i],a[j]]=[a[j],a[i]];s[i].color=COLORS.swapped;s[j].color=COLORS.swapped;yield{arr:[...a],states:s.map(x=>({...x})),code:[10,11,12]};}
      if(s[j].color!==COLORS.sorted)s[j].color=COLORS.default;
      if(s[i]&&s[i].color!==COLORS.sorted)s[i].color=COLORS.default;
    }
    [a[i+1],a[hi]]=[a[hi],a[i+1]];s[i+1].color=COLORS.sorted;s[hi].color=COLORS.default;
    yield{arr:[...a],states:s.map(x=>({...x})),code:[13]};
    const p=i+1;yield* qs(a,lo,p-1);yield* qs(a,p+1,hi);
  }
  yield* qs(arr,0,arr.length-1);
  s.forEach(x=>x.color=COLORS.sorted);yield{arr:[...arr],states:s.map(x=>({...x})),code:[]};
}
function* heapSortGen(arr){
  const n=arr.length;const s=arr.map(()=>({color:COLORS.default}));
  function* heapify(a,sz,i){
    let largest=i,l=2*i+1,r=2*i+2;
    s[i].color=COLORS.comparing;yield{arr:[...a],states:s.map(x=>({...x})),code:[11]};
    if(l<sz&&a[l]>a[largest])largest=l;if(r<sz&&a[r]>a[largest])largest=r;
    if(largest!==i){[a[i],a[largest]]=[a[largest],a[i]];s[i].color=COLORS.swapped;s[largest].color=COLORS.swapped;yield{arr:[...a],states:s.map(x=>({...x})),code:[12,13]};s[i].color=COLORS.default;s[largest].color=COLORS.default;yield* heapify(a,sz,largest);}
    else s[i].color=COLORS.default;
  }
  for(let i=Math.floor(n/2)-1;i>=0;i--)yield* heapify(arr,n,i);
  for(let i=n-1;i>0;i--){[arr[0],arr[i]]=[arr[i],arr[0]];s[i].color=COLORS.sorted;yield{arr:[...arr],states:s.map(x=>({...x})),code:[5,6]};yield* heapify(arr,i,0);}
  s[0].color=COLORS.sorted;yield{arr:[...arr],states:s.map(x=>({...x})),code:[]};
}
function genSortSteps(id,arr){
  const gen=id==='bubble'?bubbleSortGen(arr):id==='merge'?mergeSortGen(arr):id==='quick'?quickSortGen(arr):heapSortGen(arr);
  const steps=[];let r=gen.next();while(!r.done){steps.push(r.value);r=gen.next();}return steps;
}

// ═══════════════════════════════════════════
// START VIZ (universal)
// ═══════════════════════════════════════════
// resuming=true means coming back from pause/arena; don't reset stepIdx
function startViz(resuming=false){
  if(state.running)return;
  const a=ALGOS[state.current];
  state.arena=false;
  const b=document.getElementById('btn-arena');if(b){b.classList.remove('active');b.textContent='🎮 Arena';}

  if(a.type==='dsu'){state.running=true;setStatus('Running',true);runGraphAnim_dsu();return;}
  if(a.type==='grid'){startGridViz(state.current,resuming);return;}
  if(a.type==='tree'||a.type==='tree_trav'){setStatus('Use Insert/Traversal buttons');return;}

  // Always regenerate steps on a fresh start (not resume) so custom input takes effect
  if(!resuming){
    state.steps=[];state.stepIdx=0;
    regenSteps(a);
  } else if(!state.steps||!state.steps.length){
    regenSteps(a);
  }
  if(!state.steps||!state.steps.length){setStatus('Ready');return;}

  state.running=true;setStatus('Running',true);
  function tick(){
    if(!state.running||state.stepIdx>=state.steps.length){
      state.running=false;state.paused=false;setStatus('Done ✓');highlightCode([]);_restoreStartBtn();return;
    }
    if(state.arena){state.running=false;return;} // arena grabbed control
    const fr=state.steps[state.stepIdx++];
    if(state.renderFn)state.renderFn(fr);
    highlightCode(fr.code||[]);
    state.timer=setTimeout(tick,Math.max(15,600-state.speed*55));
  }
  tick();
}

function regenSteps(a){
  state.stepIdx=0;
  if(a.type==='sort'){if(state.arr&&state.arr.length){state.steps=genSortSteps(state.current,[...state.arr]);state.renderFn=fr=>renderSort(fr.arr,fr.states);}}
  else if(a.type==='array_sw')genSWSteps();
  else if(a.type==='array_tp')genTPSteps();
  else if(a.type==='array_kadane')genKadaneSteps();
  else if(a.type==='array_bm')genBoyerMooreSteps();
  else if(a.type==='graph')genGraphSteps();
  else if(a.type==='dp_fib')genFibSteps();
  else if(a.type==='dp_ks')genKSSteps();
  else if(a.type==='dp_lcs')genLCSSteps();
  else if(a.type==='binexp')genBinExpSteps();
  else if(a.type==='xor')genXORSteps();
  else if(a.type==='nim')genNimSteps();
  else if(a.type==='grundy')genGrundySteps();
  else if(a.type==='cycle_u')genCycleUSteps();
  else if(a.type==='cycle_d')genCycleDSteps();
}

// ═══════════════════════════════════════════
// SLIDING WINDOW
// ═══════════════════════════════════════════
function initArraySW(){
  // Read k from control (or default 4)
  const kEl=document.getElementById('ctrl-sw-k');
  const k=Math.max(1,+(kEl?kEl.value:4)||4);
  // Only generate random array if no custom data is loaded
  if(!state.extra._customSW){
    const n=18;
    state.arr=Array.from({length:n},()=>Math.floor(Math.random()*50)+1);
  }
  const arr=state.arr;
  if(k>arr.length){setStatus(`k(${k}) > array size(${arr.length})`,false,true);return;}
  const initSum=arr.slice(0,k).reduce((a,b)=>a+b,0);
  state.extra={k,curSum:initSum,maxSum:initSum,maxWin:[0,k-1],_customSW:state.extra._customSW};
  // Always regenerate steps fresh
  state.steps=[];state.stepIdx=0;
  genSWSteps();
  renderArraySW(0,k-1,0);
  setStatus('Ready — click ▶ Start');
}
function genSWSteps(){
  const arr=state.arr,k=state.extra.k;
  if(k>arr.length){setStatus(`k(${k}) > n(${arr.length}) — invalid`,false,true);state.steps=[];return;}
  const steps=[];
  let s=arr.slice(0,k).reduce((a,b)=>a+b,0),maxS=s,mw=[0,k-1];
  state.extra.curSum=s;state.extra.maxSum=maxS;state.extra.maxWin=[...mw];
  steps.push({winL:0,winR:k-1,curSum:s,maxSum:maxS,maxWin:[...mw],step:0,code:[4,5,6,7]});
  for(let i=1;i<=arr.length-k;i++){
    s+=arr[i+k-1]-arr[i-1];if(s>maxS){maxS=s;mw=[i,i+k-1];}
    steps.push({winL:i,winR:i+k-1,curSum:s,maxSum:maxS,maxWin:[...mw],step:i,code:[5,6,7,8]});
  }
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>{state.extra.curSum=fr.curSum;state.extra.maxSum=fr.maxSum;state.extra.maxWin=fr.maxWin;renderArraySW(fr.winL,fr.winR,fr.step);};
}
function renderArraySW(winL,winR,step){
  const arr=state.arr,{k,maxSum,curSum,maxWin}=state.extra;
  const cv=getCanvas(700,250);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);
  const bw=28,gap=4,sx=30,baseY=175;
  arr.forEach((v,i)=>{
    const x=sx+i*(bw+gap),bh=v*1.6+18;
    let col='#1e3058';
    if(i>=winL&&i<=winR&&i>=maxWin[0]&&i<=maxWin[1])col='#00e67633';
    else if(i>=winL&&i<=winR)col='#00e5ff2a';
    else if(i>=maxWin[0]&&i<=maxWin[1])col='#ffc1072a';
    ctx.fillStyle=col;ctx.fillRect(x,baseY-bh,bw,bh);
    ctx.fillStyle=(i>=winL&&i<=winR)?'#00e5ff':'#7a90b8';
    ctx.font='bold 11px Fira Code';ctx.textAlign='center';ctx.fillText(v,x+bw/2,baseY-bh-5);
    ctx.fillStyle='#3a5080';ctx.font='9px Fira Code';ctx.fillText(i,x+bw/2,baseY+13);
  });
  const wx1=sx+winL*(bw+gap),wx2=sx+(winR+1)*(bw+gap)-gap;
  ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;ctx.strokeRect(wx1-2,55,wx2-wx1+4,128);
  ctx.fillStyle='#00e5ff';ctx.font='11px Fira Code';ctx.textAlign='left';
  ctx.fillText(`Window [${winL}..${winR}]  sum=${curSum}  k=${k}`,wx1,48);
  ctx.fillStyle='#ffc107';ctx.font='11px Fira Code';
  ctx.fillText(`Max Sum = ${maxSum}  @ [${maxWin[0]}..${maxWin[1]}]`,30,212);
  ctx.fillStyle='#3a5080';ctx.font='10px Fira Code';
  ctx.fillText(`Step ${step} / ${arr.length-k}`,30,232);
}

// ═══════════════════════════════════════════
// TWO POINTER
// ═══════════════════════════════════════════
function initArrayTP(){
  // Only generate random if no custom data loaded
  if(!state.extra._customTP){
    const n=16;
    state.arr=Array.from({length:n},()=>Math.floor(Math.random()*40)+1).sort((a,b)=>a-b);
  }
  const arr=state.arr;
  const tEl=document.getElementById('ctrl-tp-target');
  let target;
  if(tEl&&tEl.value.trim()!=='') target=+tEl.value;
  else if(state.extra._customTarget!=null) target=state.extra._customTarget;
  else target=arr[Math.floor(arr.length*0.3)]+arr[Math.floor(arr.length*0.7)]+Math.floor(Math.random()*3);
  const customFlags={_customTP:state.extra._customTP,_customTarget:state.extra._customTarget};
  state.extra={target,left:0,right:arr.length-1,found:null,...customFlags};
  state.steps=[];state.stepIdx=0;
  genTPSteps();
  renderArrayTP(0,arr.length-1,null,false);
  setStatus('Ready — click ▶ Start');
}
function genTPSteps(){
  const arr=state.arr,{target}=state.extra;
  const steps=[];let left=0,right=arr.length-1;
  while(left<right){
    const sum=arr[left]+arr[right];
    if(sum===target){steps.push({left,right,found:[left,right],noSol:false,code:[3,4,5]});state.steps=steps;state.stepIdx=0;
      state.renderFn=fr=>renderArrayTP(fr.left,fr.right,fr.found,fr.noSol);return;}
    else if(sum<target){steps.push({left,right,found:null,noSol:false,code:[5,6]});left++;}
    else{steps.push({left,right,found:null,noSol:false,code:[5,7]});right--;}
  }
  steps.push({left,right,found:null,noSol:true,code:[]});
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>renderArrayTP(fr.left,fr.right,fr.found,fr.noSol);
}
function renderArrayTP(left,right,found,noSol){
  const arr=state.arr,{target}=state.extra;
  const cv=getCanvas(700,240);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);
  const bw=30,gap=4,sx=22,baseY=158;
  arr.forEach((v,i)=>{
    const x=sx+i*(bw+gap);
    let col='#1e3058';
    if(found&&(i===found[0]||i===found[1]))col='#00e67644';
    else if(i===left)col='#00e5ff33';
    else if(i===right)col='#ff408133';
    ctx.fillStyle=col;ctx.fillRect(x,baseY-v*1.1-8,bw,v*1.1+8);
    ctx.fillStyle=(i===left)?'#00e5ff':(i===right)?'#ff4081':'#8090b0';
    ctx.font='bold 11px Fira Code';ctx.textAlign='center';ctx.fillText(v,x+bw/2,baseY-v*1.1-12);
    ctx.fillStyle='#3a5080';ctx.font='9px Fira Code';ctx.fillText(i,x+bw/2,baseY+13);
  });

// KADANE'S ALGORITHM
// ═══════════════════════════════════════════
function initKadane(){
  if(!state.extra._customKadane){
    const n=18;
    state.arr=Array.from({length:n},()=>Math.floor(Math.random()*21)-7);
    if(state.arr.every(v=>v<=0))state.arr[Math.floor(n/2)]=12;
  }
  genKadaneSteps();
  renderKadane(state.steps[0]);
  setStatus('Ready — click ▶ Start');
}
function genKadaneSteps(){
  const arr=state.arr,n=arr.length;const steps=[];
  let curSum=arr[0],maxSum=arr[0],tempStart=0,maxStart=0,maxEnd=0;
  steps.push({i:0,curStart:0,curEnd:0,curSum,maxStart,maxEnd,maxSum,done:false,code:[1,2]});
  for(let i=1;i<n;i++){
    if(curSum+arr[i]<arr[i]){
      curSum=arr[i];tempStart=i;
      steps.push({i,curStart:tempStart,curEnd:i,curSum,maxStart,maxEnd,maxSum,done:false,code:[4,5]});
    } else {
      curSum+=arr[i];
      steps.push({i,curStart:tempStart,curEnd:i,curSum,maxStart,maxEnd,maxSum,done:false,code:[4,6]});
    }
    if(curSum>maxSum){maxSum=curSum;maxStart=tempStart;maxEnd=i;}
    steps.push({i,curStart:tempStart,curEnd:i,curSum,maxStart,maxEnd,maxSum,done:false,code:[7,8,9]});
  }
  steps.push({i:n-1,curStart:maxStart,curEnd:maxEnd,curSum,maxStart,maxEnd,maxSum,done:true,code:[10]});
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>renderKadane(fr);
}
function renderKadane(fr){
  const arr=state.arr;if(!arr||!arr.length)return;
  const{i,curStart,curEnd,curSum,maxStart,maxEnd,maxSum,done}=fr;
  const cv=getCanvas(700,310);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);
  const n=arr.length,bw=Math.max(18,Math.floor((640-n*3)/n)),gap=3,sx=Math.max(20,(700-(n*(bw+gap)))/2);
  const maxAbs=Math.max(...arr.map(Math.abs),1);
  const scale=72/maxAbs;
  const baseline=155;
  // Baseline
  ctx.strokeStyle='#253d6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(sx-4,baseline);ctx.lineTo(sx+n*(bw+gap)+4,baseline);ctx.stroke();
  arr.forEach((v,idx)=>{
    const x=sx+idx*(bw+gap);
    const bh=Math.abs(v)*scale||2;
    const isMax=idx>=maxStart&&idx<=maxEnd;
    const isCur=idx>=curStart&&idx<=curEnd;
    const isActive=idx===i&&!done;
    let col='#1e3058';
    if(done&&isMax)col='#00e676aa';
    else if(isActive)col='#ffc107cc';
    else if(isCur&&isMax)col='rgba(0,230,118,0.35)';
    else if(isCur)col='rgba(0,229,255,0.28)';
    else if(isMax)col='rgba(255,193,7,0.18)';
    ctx.fillStyle=col;
    v>=0?ctx.fillRect(x,baseline-bh,bw,bh):ctx.fillRect(x,baseline,bw,bh);
    ctx.fillStyle=isActive?'#ffc107':done&&isMax?'#00e676':isCur?'#00e5ff':'#5a7099';
    ctx.font=`bold ${bw>=20?10:9}px Fira Code`;ctx.textAlign='center';
    ctx.fillText(v,x+bw/2,v>=0?baseline-bh-5:baseline+bh+12);
    ctx.fillStyle='#2a4070';ctx.font='8px Fira Code';
    ctx.fillText(idx,x+bw/2,baseline+18);
  });
  // Active pointer arrow
  if(!done&&i>=0){
    const ax=sx+i*(bw+gap)+bw/2;
    ctx.fillStyle='#ffc107';ctx.font='bold 11px Fira Code';ctx.textAlign='center';
    ctx.fillText('▲',ax,baseline+28);
  }
  // Info
  if(!done){
    ctx.fillStyle='#00e5ff';ctx.font='11px Fira Code';ctx.textAlign='left';
    ctx.fillText(`curSum = ${curSum}   window [${curStart}..${curEnd}]`,28,230);
    ctx.fillStyle='#00e676';
    ctx.fillText(`maxSum = ${maxSum}   best window [${maxStart}..${maxEnd}]`,28,248);
  } else {
    ctx.fillStyle='#00e676';ctx.font='bold 13px Fira Code';ctx.textAlign='center';
    ctx.fillText(`✓ Max Subarray = [${maxStart}..${maxEnd}]  →  Sum = ${maxSum}`,350,232);
    ctx.fillStyle='#5a7099';ctx.font='10px Fira Code';
    ctx.fillText(`Elements: [ ${arr.slice(maxStart,maxEnd+1).join(', ')} ]`,350,251);
  }
  // Legend
  ctx.textBaseline='top';
  [['#1e3058','Unvisited'],['#ffc107cc','Current i'],['rgba(0,229,255,0.5)','Cur window'],['rgba(0,230,118,0.6)','Max window']].forEach(([col,lbl],k)=>{
    ctx.fillStyle=col;ctx.fillRect(20+k*148,277,10,10);
    ctx.fillStyle='#5a7099';ctx.font='9px Fira Code';ctx.textAlign='left';ctx.fillText(lbl,34+k*148,277);
  });
}

    for(let j=arr.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[arr[j],arr[k]]=[arr[k],arr[j]];}

function genBoyerMooreSteps(){

function applyGridSize(id){

}
function setGridMode(mode,id){
  state.gridMode=mode;
  ['wall','start','end'].forEach(m=>{const b=document.getElementById('gm-'+m);if(b)b.className='btn btn-mode'+(m===mode?' active':'');});
}
function initGrid(id){
  const R=state.gridRows,C=state.gridCols;
  state.grid=Array.from({length:R},(_,r)=>Array.from({length:C},(_,c)=>({wall:false,visited:false,path:false,frontier:false,r,c,dist:Infinity,prev:null})));
  state.startCell={r:2,c:2};state.endCell={r:R-3,c:C-3};
  state.extra.weights=Array.from({length:R},()=>Array.from({length:C},()=>Math.floor(Math.random()*4)+1));
  state.steps=[];state.stepIdx=0;state.gridMode='wall';

function renderGrid(id){

  const R=state.gridRows,C=state.gridCols;
  const gc=document.createElement('div');gc.className='grid-container';
  gc.style.gridTemplateColumns=`repeat(${C},22px)`;

    cell.onmouseover=()=>{if(state.drawingWalls&&state.gridMode==='wall')toggleWall(r,c,id);};
    cell.onmouseup=()=>{state.drawingWalls=false;};
    gc.appendChild(cell);
  }
  document.onmouseup=()=>state.drawingWalls=false;

}
function handleGridClick(r,c,id){
  const m=state.gridMode;
  if(m==='start'){
    state.startCell={r,c};
    document.querySelectorAll('.grid-cell').forEach(el=>el.classList.remove('start'));
    const el=document.getElementById(`gc-${r}-${c}`);if(el)updateCellClass(el,r,c);
    setGridMode('wall',id);setStatus(`Start set at (${r},${c})`);
  } else if(m==='end'){
    state.endCell={r,c};
    document.querySelectorAll('.grid-cell').forEach(el=>el.classList.remove('end'));
    const el=document.getElementById(`gc-${r}-${c}`);if(el)updateCellClass(el,r,c);
    setGridMode('wall',id);setStatus(`End set at (${r},${c})`);
  } else toggleWall(r,c,id);
}
function toggleWall(r,c,id){
  const s=state.startCell,e=state.endCell;
  if(s&&r===s.r&&c===s.c)return;if(e&&r===e.r&&c===e.c)return;
  state.grid[r][c].wall=!state.grid[r][c].wall;
  const el=document.getElementById(`gc-${r}-${c}`);if(el)updateCellClass(el,r,c);
}
function updateCellClass(el,r,c){
  const{startCell,endCell,grid}=state;el.className='grid-cell';
  if(startCell&&r===startCell.r&&c===startCell.c)el.classList.add('start');
  else if(endCell&&r===endCell.r&&c===endCell.c)el.classList.add('end');
  else if(grid[r][c].path)el.classList.add('path');
  else if(grid[r][c].visited)el.classList.add('visited');
  else if(grid[r][c].frontier)el.classList.add('frontier');
  else if(grid[r][c].wall)el.classList.add('wall');
}
function clearGridWalls(id){
  const R=state.gridRows,C=state.gridCols;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++)Object.assign(state.grid[r][c],{wall:false,visited:false,path:false,frontier:false,prev:null,dist:Infinity});
  renderGrid(id||state.current);setStatus('Cleared');
}
function getNeighbors(r,c){return[[0,1],[1,0],[0,-1],[-1,0]].map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>nr>=0&&nr<state.gridRows&&nc>=0&&nc<state.gridCols&&!state.grid[nr][nc].wall);}
// Shared grid tick — uses state.stepIdx so pause/resume/arena all work on same cursor
function runGridTick(id){
  if(!state.running||state.stepIdx>=state.steps.length){
    state.running=false;state.paused=false;
    const paths=state.steps.filter(s=>s.type==='path').length;
    setStatus(paths?`Done ✓ — path: ${paths} cells`:'⚠ No path found!',false,!paths);
    _restoreStartBtn();return;
  }
  if(state.arena){state.running=false;return;} // arena grabbed control
  const fr=state.steps[state.stepIdx++];
  if(state.renderFn)state.renderFn(fr);
  state.timer=setTimeout(()=>runGridTick(id),Math.max(5,60-state.speed*5));
}

// Resume grid animation from current stepIdx (used by toggleArena OFF)
function resumeGridViz(id){
  if(state.running)return;
  if(!state.steps||!state.steps.length){setStatus('Ready');return;}
  state.running=true;state.arena=false;setStatus('Running',true);
  runGridTick(id);
}

function startGridViz(id,resume=false){
  if(state.running)return;
  if(!state.grid)initGrid(id);
  // On fresh start: regenerate all steps. On resume: keep existing steps+stepIdx.
  if(!resume){
    const R=state.gridRows,C=state.gridCols;
    for(let r=0;r<R;r++)for(let c=0;c<C;c++)Object.assign(state.grid[r][c],{visited:false,path:false,frontier:false,prev:null,dist:Infinity});
    renderGrid(id);
    // Generate steps
    const{startCell,endCell,grid}=state;
    const algo=ALGOS[id].algo;
    const steps=[];
    const key=(r,c)=>`${r},${c}`;
    if(algo==='bfs'){
      const queue=[[startCell.r,startCell.c]];grid[startCell.r][startCell.c].visited=true;
      while(queue.length){
        const[r,c]=queue.shift();steps.push({type:'visit',r,c});
        if(r===endCell.r&&c===endCell.c)break;
        getNeighbors(r,c).forEach(([nr,nc])=>{if(!grid[nr][nc].visited){grid[nr][nc].visited=true;grid[nr][nc].prev=[r,c];queue.push([nr,nc]);steps.push({type:'frontier',r:nr,c:nc});}});
      }
    } else if(algo==='dfs'){
      const stack=[[startCell.r,startCell.c]];const vis=new Set([key(startCell.r,startCell.c)]);
      while(stack.length){
        const[r,c]=stack.pop();grid[r][c].visited=true;steps.push({type:'visit',r,c});
        if(r===endCell.r&&c===endCell.c)break;
        getNeighbors(r,c).forEach(([nr,nc])=>{if(!vis.has(key(nr,nc))){vis.add(key(nr,nc));grid[nr][nc].prev=[r,c];stack.push([nr,nc]);steps.push({type:'frontier',r:nr,c:nc});}});
      }
    } else {
      const dist={};dist[key(startCell.r,startCell.c)]=0;grid[startCell.r][startCell.c].dist=0;
      const pq=[[0,startCell.r,startCell.c]];
      const h=(r,c)=>algo==='astar'?Math.abs(r-endCell.r)+Math.abs(c-endCell.c):0;
      while(pq.length){
        pq.sort((a,b)=>a[0]-b[0]);const[d,r,c]=pq.shift();
        if(grid[r][c].visited)continue;
        grid[r][c].visited=true;steps.push({type:'visit',r,c});
        if(r===endCell.r&&c===endCell.c)break;
        getNeighbors(r,c).forEach(([nr,nc])=>{
          const w=state.extra.weights[nr][nc],nd=d+w;
          if(nd<(dist[key(nr,nc)]||Infinity)){dist[key(nr,nc)]=nd;grid[nr][nc].prev=[r,c];grid[nr][nc].dist=nd;pq.push([nd+h(nr,nc),nr,nc]);steps.push({type:'frontier',r:nr,c:nc});}
        });
      }
    }
    let cur=[endCell.r,endCell.c];
    while(cur){
      if(cur[0]===startCell.r&&cur[1]===startCell.c)break;
      steps.push({type:'path',r:cur[0],c:cur[1]});
      const prev=grid[cur[0]][cur[1]].prev;cur=prev;
    }
    state.steps=steps;state.stepIdx=0;
    state.renderFn=fr=>{
      const el=document.getElementById(`gc-${fr.r}-${fr.c}`);if(!el)return;
      if(fr.type==='visit')el.className='grid-cell visited';
      else if(fr.type==='frontier')el.className='grid-cell frontier';
      else if(fr.type==='path')el.className='grid-cell path';
      updateCellClass(document.getElementById(`gc-${startCell.r}-${startCell.c}`),startCell.r,startCell.c);
      updateCellClass(document.getElementById(`gc-${endCell.r}-${endCell.c}`),endCell.r,endCell.c);
    };
  }
  state.running=true;setStatus('Running',true);
  runGridTick(id);
}

// GRAPH TRAVERSAL (fixed layout)
// ═══════════════════════════════════════════
function initGraph(id){
  const algo=ALGOS[id].algo;
  const n=algo==='topo'?8:9;
  const cx=350,cy=195,rx=200,ry=145;
  const nodes=Array.from({length:n},(_,i)=>({
    id:i,
    x:cx+Math.cos(i/n*2*Math.PI-Math.PI/2)*rx+(Math.random()-.5)*18,
    y:cy+Math.sin(i/n*2*Math.PI-Math.PI/2)*ry+(Math.random()-.5)*14,
    label:algo==='topo'?String.fromCharCode(65+i):i
  }));
  let edges=[];
  if(algo==='topo'){
    edges=[[0,2],[0,3],[1,3],[1,4],[2,5],[3,5],[3,6],[4,6],[5,7],[6,7]];
    const layers=[[0,1],[2,3,4],[5,6],[7]];
    layers.forEach((layer,li)=>layer.forEach((ni,ei)=>{
      nodes[ni].x=100+(ei+1)*(560/(layer.length+1));
      nodes[ni].y=55+li*112;
    }));
  } else {
    for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)if(Math.random()<0.30)edges.push([i,j]);
    if(!edges.some(e=>e[0]===0||e[1]===0))edges.push([0,1]);
    if(!edges.some(e=>e[0]===1||e[1]===1))edges.push([1,2]);
  }
  state.extra.graphNodes=nodes;state.extra.graphEdges=edges;state.extra.graphAlgo=algo;
  genGraphSteps();
  renderGraph([],[],null,[]);
}
function genGraphSteps(){
  const{graphNodes:nodes,graphEdges:edges,graphAlgo:algo}=state.extra;
  if(!nodes)return;
  const n=nodes.length;
  const lbl=i=>nodes[i].label; // shorthand
  const adj=Array.from({length:n},()=>[]);
  edges.forEach(([a,b])=>{adj[a].push(b);if(algo!=='topo')adj[b].push(a);});
  const steps=[],visited=[];

  if(algo==='bfs'){
    const vis=new Set([0]);const q=[0];visited.push(0);
    const nbStr=node=>{
      const nbs=adj[node].map(nb=>lbl(nb));
      return nbs.length?nbs.join(', '):'(none)';
    };
    steps.push({
      visited:[...visited],frontier:[...q],current:0,topo:[],pathStr:'',
      queueStr:`Queue: [${lbl(0)}]`,
      explain:`Start: enqueue node <b style="color:var(--cyan)">${lbl(0)}</b>. Mark visited.\nQueue: [${lbl(0)}]`,
      code:[1,2]
    });
    while(q.length){
      const node=q.shift();
      const newNbs=adj[node].filter(nb=>!vis.has(nb));
      steps.push({
        visited:[...visited],frontier:[...q],current:node,topo:[],
        pathStr:visited.map(v=>lbl(v)).join(' → '),
        queueStr:`Queue: [${q.map(x=>lbl(x)).join(', ')||'empty'}]`,
        explain:`Dequeue <b style="color:var(--amber)">${lbl(node)}</b>. Visit it.\nNeighbors of ${lbl(node)}: ${nbStr(node)}\nUnvisited → push: [${newNbs.map(x=>lbl(x)).join(', ')||'none'}]`,
        code:[4,5]
      });
      adj[node].forEach(nb=>{if(!vis.has(nb)){vis.add(nb);visited.push(nb);q.push(nb);}});
      steps.push({
        visited:[...visited],frontier:[...q],current:node,topo:[],
        pathStr:visited.map(v=>lbl(v)).join(' → '),
        queueStr:`Queue: [${q.map(x=>lbl(x)).join(', ')||'empty'}]`,
        explain:`After processing <b style="color:var(--amber)">${lbl(node)}</b>:\nVisited: ${visited.map(v=>lbl(v)).join(' → ')}\nQueue: [${q.map(x=>lbl(x)).join(', ')||'empty'}]`,
        code:[6,7,8]
      });
    }
  } else if(algo==='dfs'){
    const vis=new Set();const callStack=[];
    function dfs(node,depth=0){
      vis.add(node);visited.push(node);callStack.push(lbl(node));
      steps.push({
        visited:[...visited],frontier:[],current:node,topo:[],
        pathStr:visited.map(v=>lbl(v)).join(' → '),
        queueStr:`Stack: [${[...callStack].reverse().join(', ')}]`,
        explain:`Visit <b style="color:var(--amber)">${lbl(node)}</b> (depth ${depth}).\nMark as visited. Recurse into unvisited neighbors.\nCall stack: [${[...callStack].reverse().join(' → ')}]`,
        code:[1,2]
      });
      adj[node].forEach(nb=>{
        if(!vis.has(nb)){
          steps.push({
            visited:[...visited],frontier:[nb],current:node,topo:[],
            pathStr:visited.map(v=>lbl(v)).join(' → '),
            queueStr:`Next: ${lbl(nb)} (unvisited neighbor of ${lbl(node)})`,
            explain:`From <b>${lbl(node)}</b>: neighbor <b style="color:var(--purple)">${lbl(nb)}</b> is unvisited → call DFS(${lbl(nb)})`,
            code:[3,4,5]
          });
          dfs(nb,depth+1);
        }
      });
      callStack.pop();
    }
    for(let i=0;i<n;i++)if(!vis.has(i))dfs(i);
  } else if(algo==='topo'){
    const inDeg=Array(n).fill(0);edges.forEach(([a,b])=>inDeg[b]++);
    const q=[],topo=[];
    for(let i=0;i<n;i++)if(inDeg[i]===0)q.push(i);
    const inDegStr=()=>nodes.map((_,i)=>`${lbl(i)}:${inDeg[i]}`).join(' ');
    steps.push({
      visited:[],frontier:[...q],current:-1,topo:[],
      pathStr:'',queueStr:`Queue: [${q.map(x=>lbl(x)).join(', ')}]`,
      explain:`Compute in-degrees: ${inDegStr()}\nNodes with in-degree 0 → start queue: [${q.map(x=>lbl(x)).join(', ')}]`,
      code:[1,2]
    });
    while(q.length){
      const node=q.shift();topo.push(node);
      const nbs=adj[node];
      steps.push({
        visited:[...topo],frontier:[...q],current:node,topo:[...topo],
        pathStr:topo.map(v=>lbl(v)).join(' → '),
        queueStr:`Queue: [${q.map(x=>lbl(x)).join(', ')||'empty'}]`,
        explain:`Dequeue <b style="color:var(--amber)">${lbl(node)}</b>. Add to result.\nResult so far: ${topo.map(v=>lbl(v)).join(' → ')}\nDecrement in-degree of neighbors: ${nbs.map(x=>lbl(x)).join(', ')||'(none)'}`,
        code:[5,6]
      });
      adj[node].forEach(nb=>{inDeg[nb]--;if(inDeg[nb]===0)q.push(nb);});
      steps.push({
        visited:[...topo],frontier:[...q],current:node,topo:[...topo],
        pathStr:topo.map(v=>lbl(v)).join(' → '),
        queueStr:`Queue: [${q.map(x=>lbl(x)).join(', ')||'empty'}]`,
        explain:`After processing <b>${lbl(node)}</b>:\nIn-degrees now: ${inDegStr()}\nNewly zero → pushed: [${adj[node].filter(x=>inDeg[x]===0).map(x=>lbl(x)).join(', ')||'none'}]`,
        code:[8,9,10]
      });
    }
  }
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>{
    renderGraph(fr.visited,fr.frontier,fr.current,fr.topo);
    updateGraphExplain(fr.explain||'',fr.pathStr||'',fr.queueStr||'');
  };
}

function updateGraphExplain(explain,pathStr,queueStr=''){
  ensureGraphExplainPanel();
  const pathBar=document.getElementById('graph-path-bar');
  if(pathBar){
    pathBar.innerHTML=`<span style="color:var(--text-dim);font-size:9px;letter-spacing:1px;">TRAVERSAL PATH </span>`+
      (pathStr?`<span style="color:var(--amber)">${pathStr}</span>`:`<span style="color:var(--text-dim)">—</span>`);
  }
  const linesEl=document.getElementById('graph-explain-lines');
  if(!linesEl)return;
  if(explain===_lastExplain)return;
  _lastExplain=explain;
  // Fade out old lines, fade in new
  const lines=explain.split('\n').filter(Boolean);
  const prevLines=linesEl.querySelectorAll('.graph-explain-line:not(.old)');
  prevLines.forEach(el=>{el.classList.add('old');setTimeout(()=>el.remove(),380);});
  lines.forEach((txt,i)=>{
    const div=document.createElement('div');
    div.className='graph-explain-line '+(i===0?'cur':'prev');
    div.innerHTML=txt;
    div.style.opacity='0';div.style.transform='translateY(4px)';
    linesEl.appendChild(div);
    setTimeout(()=>{div.style.transition='opacity .3s,transform .3s';div.style.opacity='1';div.style.transform='translateY(0)';},i*60+80);
  });
  if(queueStr){
    const qDiv=document.createElement('div');
    qDiv.className='graph-explain-line prev';
    qDiv.innerHTML=`<span class="ds-badge">${queueStr}</span>`;
    qDiv.style.cssText='opacity:0;transform:translateY(4px);margin-top:3px;';
    linesEl.appendChild(qDiv);
    setTimeout(()=>{qDiv.style.transition='opacity .3s,transform .3s';qDiv.style.opacity='1';qDiv.style.transform='translateY(0)';},lines.length*60+100);
  }
}

function renderGraph(visited,frontier,current,topoOrder){
  const{graphNodes:nodes,graphEdges:edges,graphAlgo:algo}=state.extra;
  if(!nodes)return;
  const cv=getCanvas(700,370);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);
  // Draw edges with visited-edge highlighting
  edges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b];
    const bothVisited=visited&&visited.includes(a)&&visited.includes(b);
    ctx.strokeStyle=bothVisited?'#00e67644':'#253d6a';
    ctx.lineWidth=bothVisited?2.5:1.8;
    if(algo==='topo'){
      const dx=nb.x-na.x,dy=nb.y-na.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/len,uy=dy/len,ex=nb.x-ux*20,ey=nb.y-uy*20;
      ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.fillStyle=bothVisited?'#00e67644':'#253d6a';
      ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex-uy*7-ux*11,ey+ux*7-uy*11);ctx.lineTo(ex+uy*7-ux*11,ey-ux*7-uy*11);ctx.fill();
    } else {ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();}
  });
  // Draw nodes
  nodes.forEach((nd,i)=>{
    let col='#1e3058';
    if(visited&&visited.includes(i))col='#00e676';
    if(frontier&&frontier.includes(i))col='#ce93d8';
    if(current===i)col='#ffc107';
    ctx.beginPath();ctx.arc(nd.x,nd.y,20,0,Math.PI*2);
    ctx.fillStyle=col+'cc';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=current===i?'#000':'#fff';ctx.font='bold 12px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nd.label,nd.x,nd.y);
  });
  // Topo order bar (inline on canvas)
  if(topoOrder&&topoOrder.length){
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(10,338,680,26);
    ctx.fillStyle='#ffc107';ctx.font='11px Fira Code';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('Topo Order: '+topoOrder.map(i=>nodes[i].label).join(' → '),18,351);
  }
  // Legend
  ctx.textBaseline='top';
  [['#1e3058','Unvisited'],['#ce93d8','Frontier'],['#ffc107','Current'],['#00e676','Visited']].forEach(([col,lbl],i)=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(22+i*130,18,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7099';ctx.font='10px Fira Code';ctx.fillText(lbl,33+i*130,13);
  });
  // Ensure explain panel exists below canvas
  ensureGraphExplainPanel();
}

function initDSU(){
  const n=10;state.extra.dsuN=n;
  state.extra.dsuParent=Array.from({length:n},(_,i)=>i);
  state.extra.dsuRank=Array(n).fill(0);state.extra.dsuEdges=[];
  state.extra.dsuPos=Array.from({length:n},(_,i)=>({x:65+i%5*125+(Math.random()-.5)*20,y:90+Math.floor(i/5)*200+(Math.random()-.5)*20}));
  state.steps=[];state.stepIdx=0;
  renderDSU([]);
}
function dsuFind(parent,x){if(parent[x]!==x)parent[x]=dsuFind(parent,parent[x]);return parent[x];}
function renderDSU(highlight){
  const{dsuN:n,dsuParent:par,dsuPos:pos,dsuEdges:edges}=state.extra;
  const cv=getCanvas(700,400);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);
  const comp={},compColors=['#00e5ff','#ffc107','#00e676','#ff4081','#ce93d8','#ff7043','#26c6da','#66bb6a'];
  const rootMap={};let ci=0;
  for(let i=0;i<n;i++){const root=dsuFind([...par],i);if(!(root in rootMap)){rootMap[root]=compColors[ci%compColors.length];ci++;}comp[i]=rootMap[root];}
  edges.forEach(([a,b])=>{ctx.strokeStyle=comp[a];ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pos[a].x,pos[a].y);ctx.lineTo(pos[b].x,pos[b].y);ctx.stroke();});
  for(let i=0;i<n;i++){
    const hl=highlight.includes(i);
    ctx.beginPath();ctx.arc(pos[i].x,pos[i].y,22,0,Math.PI*2);
    ctx.fillStyle=hl?'#fff':comp[i]+'44';ctx.fill();
    ctx.strokeStyle=comp[i];ctx.lineWidth=hl?3:2;ctx.stroke();
    ctx.fillStyle=hl?'#000':comp[i];ctx.font='bold 13px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i,pos[i].x,pos[i].y);
    if(par[i]!==i){ctx.strokeStyle='#1e3058';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pos[i].x,pos[i].y-24);ctx.lineTo(pos[par[i]].x,pos[par[i]].y+24);ctx.stroke();ctx.setLineDash([]);}
  }
  const nr=Object.keys(rootMap).length;
  ctx.fillStyle='#5a7099';ctx.font='10px Fira Code';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`${nr} component(s) — click ▶ Run Unions to animate`,20,370);
}
function runGraphAnim_dsu(){
  const n=state.extra.dsuN;
  const parent=[...Array(n).keys()],rank=Array(n).fill(0);
  const pairs=[];for(let i=0;i<Math.floor(n*0.85);i++)pairs.push([Math.floor(Math.random()*n),Math.floor(Math.random()*n)]);
  const steps=[];state.extra.dsuEdges=[];
  pairs.forEach(([a,b])=>{
    let ra=dsuFind(parent,a),rb=dsuFind(parent,b);
    if(ra!==rb){
      if(rank[ra]<rank[rb]){let t=ra;ra=rb;rb=t;}
      parent[rb]=ra;if(rank[ra]===rank[rb])rank[ra]++;
      state.extra.dsuEdges.push([a,b]);
      steps.push({highlight:[a,b],par:[...parent],code:[7,8,9,10,11,12]});
    }
  });
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>{state.extra.dsuParent=fr.par;renderDSU(fr.highlight);};
  let idx=0;
  function tick(){
    if(!state.running||idx>=steps.length){state.running=false;state.paused=false;setStatus('Done ✓');_restoreStartBtn();return;}
    const fr=steps[idx++];state.extra.dsuParent=fr.par;renderDSU(fr.highlight);highlightCode(fr.code);
    state.timer=setTimeout(tick,Math.max(150,800-state.speed*70));
  }
  tick();
}


// ═══════════════════════════════════════════
// TREE (BST + Tree Traversals)
// ═══════════════════════════════════════════
class TreeNode{constructor(v){this.val=v;this.left=null;this.right=null;}}
function initTree(){
  const vals=[50,30,70,20,40,60,80,10,25];
  state.extra.treeRoot=null;
  vals.forEach(v=>{state.extra.treeRoot=bstInsertNode(state.extra.treeRoot,v);});
  state.extra.treeHighlight=new Set();state.extra.traversalOrder=[];
  renderTree(new Set(),[]);
}
function bstInsertNode(root,val){
  if(!root)return new TreeNode(val);
  if(val<root.val)root.left=bstInsertNode(root.left,val);
  else if(val>root.val)root.right=bstInsertNode(root.right,val);
  return root;
}
function bstDeleteNode(root,val){
  if(!root)return null;
  if(val<root.val){root.left=bstDeleteNode(root.left,val);}
  else if(val>root.val){root.right=bstDeleteNode(root.right,val);}
  else{
    if(!root.left)return root.right;
    if(!root.right)return root.left;
    let succ=root.right;while(succ.left)succ=succ.left;
    root.val=succ.val;root.right=bstDeleteNode(root.right,succ.val);
  }
  return root;
}
function countTreeNodes(root){let c=0;function cnt(n){if(!n)return;c++;cnt(n.left);cnt(n.right);}cnt(root);return c;}
function treeInsert(){
  const v=+(document.getElementById('ctrl-tval')||{value:0}).value;
  if(!v){setStatus('Enter a value',false,true);return;}
  state.extra.treeRoot=bstInsertNode(state.extra.treeRoot,v);
  renderTree(new Set(),[]);setStatus(`Inserted ${v} ✓`);
}
function treeSearch(){
  const v=+(document.getElementById('ctrl-tval')||{value:0}).value;
  if(!v){setStatus('Enter a value',false,true);return;}
  const path=[];let node=state.extra.treeRoot;
  while(node){path.push(node.val);if(v===node.val)break;node=v<node.val?node.left:node.right;}
  let idx=0;
  function tick(){
    if(idx>=path.length){
      renderTree(new Set([path[path.length-1]]),path);
      setStatus(path[path.length-1]===v?`Found ${v} ✓`:`${v} not found ✗`,false,path[path.length-1]!==v);return;
    }
    renderTree(new Set([path[idx]]),path.slice(0,idx+1));
    idx++;state.timer=setTimeout(tick,400-state.speed*30);
  }
  tick();
}
function treeDelete(){
  const v=+(document.getElementById('ctrl-tval')||{value:0}).value;
  if(!v){setStatus('Enter a value to delete',false,true);return;}
  const cnt=countTreeNodes(state.extra.treeRoot);
  if(cnt<=1){setStatus('⚠ Cannot delete — only 1 node left',false,true);return;}
  // Check node exists
  let found=false;
  function checkExists(n){if(!n)return;if(n.val===v)found=true;checkExists(n.left);checkExists(n.right);}
  checkExists(state.extra.treeRoot);
  if(!found){setStatus(`✗ Node ${v} not in tree`,false,true);return;}
  state.extra.treeRoot=bstDeleteNode(state.extra.treeRoot,v);
  renderTree(new Set(),[]);setStatus(`Deleted ${v} ✓`);
}
function startTraversal(type){
  const order=[];
  function inn(n){if(!n)return;inn(n.left);order.push(n.val);inn(n.right);}
  function pre(n){if(!n)return;order.push(n.val);pre(n.left);pre(n.right);}
  function post(n){if(!n)return;post(n.left);post(n.right);order.push(n.val);}
  if(type==='inorder')inn(state.extra.treeRoot);
  else if(type==='preorder')pre(state.extra.treeRoot);
  else post(state.extra.treeRoot);
  // Generate steps for arena support
  state.steps=order.map((v,i)=>({hlSet:[v],order:order.slice(0,i+1),code:[type==='inorder'?1:type==='preorder'?5:9]}));
  state.stepIdx=0;
  state.renderFn=fr=>renderTree(new Set(fr.hlSet||[]),fr.order||[]);
  let idx=0;state.running=true;setStatus('Running',true);
  function tick(){
    if(!state.running||idx>=state.steps.length){state.running=false;setStatus('Done ✓');return;}
    const fr=state.steps[idx++];renderTree(new Set(fr.hlSet),fr.order);highlightCode(fr.code);
    state.timer=setTimeout(tick,Math.max(80,500-state.speed*45));
  }
  tick();
}
function getTreeLayout(root){
  const positions={};let x=0;
  function dfs(node,depth){if(!node)return;dfs(node.left,depth+1);positions[node.val]={x:x*65+50,y:depth*78+55};x++;dfs(node.right,depth+1);}
  dfs(root,0);return positions;
}
function renderTree(highlight,order){
  const root=state.extra.treeRoot;
  if(!root){const ca=document.getElementById('av-canvas');ca.innerHTML='<div style="color:#5a7099;font-size:12px;padding:20px;font-family:Fira Code">Tree is empty — insert values above.</div>';return;}
  const pos=getTreeLayout(root);
  const vals=Object.keys(pos).map(Number);
  const maxX=Math.max(...vals.map(v=>pos[v].x)),maxY=Math.max(...vals.map(v=>pos[v].y));
  const W=Math.max(700,maxX+80),H=Math.max(370,maxY+80);
  const cv=getCanvas(W,H);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,W,H);
  const offX=Math.max(0,(W-maxX-50)/2);
  function drawEdges(node){
    if(!node)return;
    if(node.left){ctx.strokeStyle='#1e3058';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pos[node.val].x+offX,pos[node.val].y);ctx.lineTo(pos[node.left.val].x+offX,pos[node.left.val].y);ctx.stroke();drawEdges(node.left);}
    if(node.right){ctx.strokeStyle='#1e3058';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pos[node.val].x+offX,pos[node.val].y);ctx.lineTo(pos[node.right.val].x+offX,pos[node.right.val].y);ctx.stroke();drawEdges(node.right);}
  }
  function drawNodes(node){
    if(!node)return;

function initBinExp(){
  const a=+(document.getElementById('be-a')||{value:2}).value||2;
  const b=+(document.getElementById('be-b')||{value:10}).value||10;
  const mod=+(document.getElementById('be-mod')||{value:1000}).value||1000;
  state.extra.beA=a;state.extra.beB=b;state.extra.beMod=mod;
  genBinExpSteps();renderBinExp([],null);
}
function genBinExpSteps(){
  let a=state.extra.beA,b=state.extra.beB;const mod=state.extra.beMod;
  let result=1;a=a%mod;
  const allRows=[];let step=0;
  while(b>0){
    const odd=(b&1)===1,r=odd?result*a%mod:result;
    allRows.push({step,b_bin:b.toString(2),odd:odd?'yes':'no',result:r,base:a,action:odd?`result=${result}×${a}%${mod}`:'skip'});
    if(odd)result=r;b>>=1;a=a*a%mod;step++;
  }
  allRows.push({step,b_bin:'0',odd:'no',result,base:a,action:'done'});
  const steps=allRows.map((_,i)=>({rows:allRows.slice(0,i+1),current:i,code:[3,4,5,6,7]}));
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>renderBinExp(fr.rows,fr.current);
}
function renderBinExp(rows,current){
  const{beA:a,beB:b,beMod:mod}=state.extra;

  const h=document.createElement('tr');['Step','b (binary)','b odd?','result','a','action'].forEach(hd=>{const th=document.createElement('th');th.textContent=hd;h.appendChild(th);});
  tbl.appendChild(h);
  rows.forEach((r,i)=>{
    const tr=document.createElement('tr');const isCur=i===current;
    [r.step,r.b_bin,r.odd,r.result,r.base,r.action].forEach((val,j)=>{
      const td=document.createElement('td');td.textContent=val;
      if(isCur)td.classList.add('active');else if(i<(current||Infinity))td.classList.add('done');
      if(j===2&&val==='yes')td.style.color='#00e676';
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });
  wrap.appendChild(tbl);
  if(rows.length&&rows[rows.length-1].action==='done'){const res=document.createElement('div');res.style.cssText='font-size:14px;font-family:Fira Code;color:#00e676;';res.textContent=`Result: ${a}^${b} mod ${mod} = ${rows[rows.length-1].result}`;wrap.appendChild(res);}
  ca.appendChild(wrap);
}

function genXORSteps(){

  const steps=arr.map((_,i)=>({done:Array.from({length:i+1},(_,j)=>j),running:i,result:null,code:[2,3,4,5]}));
  let r=0;arr.forEach(v=>r^=v);

function renderXOR(done,running,result){

  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);

// ═══════════════════════════════════════════
// NIM GAME
// ═══════════════════════════════════════════
function initNim(){
  state.extra.nimHeaps=[3,5,7];state.extra.nimHistory=[];state.extra.nimTurn='Player';
  genNimSteps();renderNim();
}
function nimXOR(heaps){return heaps.reduce((a,b)=>a^b,0);}
function genNimSteps(){
  let heaps=[...state.extra.nimHeaps];const steps=[];const history=[];
  function compMove(h){const xr=nimXOR(h);if(xr===0){const ni=h.findIndex(v=>v>0);if(ni>=0){const nh=[...h];nh[ni]--;return nh;}return h;}for(let i=0;i<h.length;i++){const t=h[i]^xr;if(t<h[i]){const nh=[...h];nh[i]=t;return nh;}}return h;}
  function playerMove(h){const ni=h.findIndex(v=>v>0);if(ni<0)return h;const nh=[...h];nh[ni]=Math.max(0,nh[ni]-1);return nh;}
  let turn='Computer';
  for(let s=0;s<40;s++){
    if(heaps.every(h=>h===0))break;
    const prev=[...heaps];heaps=turn==='Computer'?compMove(heaps):playerMove(heaps);
    history.push(`${turn}: [${prev}]→[${heaps}]`);
    steps.push({heaps:[...heaps],history:[...history],turn,code:[2,3,4,5,6,7,8,9]});
    turn=turn==='Computer'?'Player':'Computer';
  }
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>{state.extra.nimHeaps=fr.heaps;state.extra.nimHistory=fr.history;state.extra.nimTurn=fr.turn;renderNim();};
}
function renderNim(){
  const{nimHeaps:heaps,nimHistory:history,nimTurn:turn}=state.extra;
  if(!heaps){state.extra.nimHeaps=[3,5,7];state.extra.nimHistory=[];state.extra.nimTurn='Player';return renderNim();}
  const xr=nimXOR(heaps),win=xr!==0;
  const ca=document.getElementById('av-canvas');ca.innerHTML='';
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;padding-top:14px;';
  const status=document.createElement('div');status.style.cssText='font-size:12px;font-family:Fira Code;';
  status.innerHTML=`Turn: <b style='color:#00e5ff'>${turn}</b> &nbsp;|&nbsp; XOR = <b style='color:${win?'#00e676':'#ff4081'}'>${xr}</b> → <b>${win?turn+' has winning move':'Losing position'}</b>`;
  wrap.appendChild(status);
  const heapRow=document.createElement('div');heapRow.style.cssText='display:flex;gap:28px;align-items:flex-end;';
  heaps.forEach((h,i)=>{
    const col=document.createElement('div');col.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px;';
    const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:#5a7099;font-family:Fira Code;';lbl.textContent=`Heap ${i+1}`;
    const sticks=document.createElement('div');sticks.style.cssText='display:flex;gap:4px;align-items:flex-end;min-height:90px;';
    for(let s=0;s<h;s++){const st=document.createElement('div');st.style.cssText='width:14px;height:'+(16+s*3)+'px;background:linear-gradient(180deg,#ffe060,#ffc107);border-radius:2px 2px 0 0;';sticks.appendChild(st);}
    const cnt=document.createElement('div');cnt.style.cssText='font-size:22px;color:#ffc107;font-family:Fira Code;font-weight:700;';cnt.textContent=h;
    col.appendChild(lbl);col.appendChild(sticks);col.appendChild(cnt);heapRow.appendChild(col);
  });
  wrap.appendChild(heapRow);
  if(history&&history.length){const hist=document.createElement('div');hist.style.cssText='font-size:10px;color:#5a7099;font-family:Fira Code;max-width:600px;text-align:center;';hist.textContent='Last moves: '+history.slice(-4).join(' → ');wrap.appendChild(hist);}
  if(heaps.every(h=>h===0)){const w=document.createElement('div');w.style.cssText='font-size:16px;color:#00e676;font-family:Fira Code;font-weight:700;';w.textContent=turn==='Player'?'🏆 Computer wins!':'🏆 Player wins!';wrap.appendChild(w);}
  ca.appendChild(wrap);
}

function initGrundy(){

}
function mex(s){let i=0;while(s.has(i))i++;return i;}
function genGrundySteps(){
  const n=state.extra.grundyN,moves=state.extra.grundyMoves;
  const G=Array(n+1).fill(null);G[0]=0;
  const steps=[{G:[...G],filled:[0],cur:0,code:[1]}];
  for(let i=1;i<=n;i++){
    const reach=new Set(moves.filter(m=>i-m>=0).map(m=>G[i-m]));
    G[i]=mex(reach);
    steps.push({G:[...G],filled:Array.from({length:i+1},(_,j)=>j),cur:i,code:[2,3,4,5,6,7]});
  }
  state.steps=steps;state.stepIdx=0;
  state.extra.grundyG=Array(n+1).fill(null);
  state.renderFn=fr=>{state.extra.grundyG=fr.G;renderGrundy(fr.filled,fr.cur);};
}
function renderGrundy(filled,current){
  const{grundyN:n,grundyG:G,grundyMoves:moves}=state.extra;
  const ca=document.getElementById('av-canvas');ca.innerHTML='';
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;padding-top:12px;';
  const info=document.createElement('div');info.style.cssText='font-size:11px;color:#5a7099;font-family:Fira Code;';
  info.textContent=`Moves: {${moves.join(',')}}   G[n] = mex({G[n-m] for m in moves})`;
  wrap.appendChild(info);
  const row=document.createElement('div');row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;justify-content:center;';
  for(let i=0;i<=n;i++){
    const box=document.createElement('div');
    let bg='#0d1526',border='#1e3058',col='#5a7099';
    if(i===current){bg='rgba(255,193,7,.2)';border='#ffc107';col='#ffc107';}
    else if(filled&&filled.includes(i)&&G&&G[i]!=null){bg=G[i]===0?'rgba(255,64,129,.15)':'rgba(0,230,118,.1)';border=G[i]===0?'#ff4081':'#00e676';col=G[i]===0?'#ff4081':'#00e676';}
    box.style.cssText=`width:66px;height:74px;background:${bg};border:1px solid ${border};border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .2s;`;
    const posEl=document.createElement('div');posEl.style.cssText='font-size:10px;color:#5a7099;font-family:Fira Code;';posEl.textContent='n='+i;
    const gEl=document.createElement('div');gEl.style.cssText=`font-size:22px;font-weight:700;color:${col};font-family:Fira Code;`;gEl.textContent=G&&G[i]!=null?G[i]:'?';
    const wlEl=document.createElement('div');wlEl.style.cssText=`font-size:9px;color:${col};font-family:Fira Code;`;
    if(G&&G[i]!=null)wlEl.textContent=G[i]===0?'Lose':'Win';
    box.appendChild(posEl);box.appendChild(gEl);box.appendChild(wlEl);row.appendChild(box);
  }
  wrap.appendChild(row);
  if(current!=null&&G&&G[current]!=null){
    const det=document.createElement('div');det.style.cssText='font-size:11px;font-family:Fira Code;color:#ce93d8;';
    const rch=moves.filter(m=>current-m>=0).map(m=>`G[${current-m}]=${G[current-m]}`).join(', ');
    det.innerHTML=`G[${current}] = mex({${rch}}) = <b style='color:#ffc107'>${G[current]}</b> → ${G[current]===0?'<span style="color:#ff4081">Losing</span>':'<span style="color:#00e676">Winning</span>'}`;
    wrap.appendChild(det);
  }
  ca.appendChild(wrap);
}

// ═══════════════════════════════════════════
// CYCLE DETECTION — UNDIRECTED
// ═══════════════════════════════════════════
function _buildCycleUGraph(){
  const n=8;
  const cx=350,cy=195,rx=200,ry=145;
  const nodes=Array.from({length:n},(_,i)=>({
    id:i,x:cx+Math.cos(i/n*2*Math.PI-Math.PI/2)*rx+(Math.random()-.5)*16,
    y:cy+Math.sin(i/n*2*Math.PI-Math.PI/2)*ry+(Math.random()-.5)*12,label:i
  }));
  let edges=[];
  // Build a spanning tree first (no cycle), then add one extra edge to guarantee a cycle
  for(let i=1;i<n;i++)edges.push([i,Math.floor(Math.random()*i)]);
  // Add one cycle-forming edge
  const a=Math.floor(Math.random()*(n-2))+1,b=Math.floor(Math.random()*(n-a-1))+a+1;
  edges.push([a,b]);
  // Deduplicate
  const eSet=new Set();edges=edges.filter(([u,v])=>{const k=Math.min(u,v)+','+Math.max(u,v);if(eSet.has(k))return false;eSet.add(k);return true;});
  state.extra.graphNodes=nodes;state.extra.graphEdges=edges;
}

function initCycleU(){
  _buildCycleUGraph();
  genCycleUSteps();
  renderCycleU({color:Array(state.extra.graphNodes.length).fill(0),current:-1,parent:{},backEdge:null,done:false,hasCycle:false});
  setStatus('Ready — click ▶ Start');
}

function genCycleUSteps(){
  const{graphNodes:nodes,graphEdges:edges}=state.extra;
  if(!nodes)return;
  const n=nodes.length;
  const adj=Array.from({length:n},()=>[]);
  edges.forEach(([a,b])=>{adj[a].push(b);adj[b].push(a);});
  // color: 0=white(unvisited) 1=gray(in stack) 2=black(done)
  const color=Array(n).fill(0);
  const parent=Array(n).fill(-1);
  const steps=[];
  let cycleFound=false,backEdge=null;

  function dfs(u){
    color[u]=1;
    steps.push({
      color:[...color],current:u,parent:{...parent},backEdge:null,done:false,hasCycle:false,
      explain:`Visit node <b style="color:var(--amber)">${u}</b> → mark GRAY (in stack)\nParent of ${u}: ${parent[u]>=0?parent[u]:'—'}`,
      code:[3,4]
    });
    for(const v of adj[u]){
      if(color[v]===0){
        parent[v]=u;
        steps.push({
          color:[...color],current:u,parent:{...parent},backEdge:null,done:false,hasCycle:false,
          explain:`From <b>${u}</b>: neighbor <b style="color:var(--purple)">${v}</b> is WHITE → recurse DFS(${v})`,
          code:[5,6,7]
        });
        if(dfs(v))return true;
        if(cycleFound)return true;
      } else if(v!==parent[u]){
        // Back edge found
        cycleFound=true;backEdge=[u,v];
        steps.push({
          color:[...color],current:u,parent:{...parent},backEdge:[u,v],done:false,hasCycle:true,
          explain:`From <b style="color:var(--pink)">${u}</b>: neighbor <b style="color:var(--pink)">${v}</b> is GRAY and not parent → <b style="color:var(--pink)">BACK EDGE!</b>\nCycle detected: ${v} ← … ← ${u} ← ${v}`,
          code:[8,9]
        });
        return true;
      } else {
        steps.push({
          color:[...color],current:u,parent:{...parent},backEdge:null,done:false,hasCycle:false,
          explain:`From <b>${u}</b>: neighbor <b>${v}</b> is GRAY but is parent → skip (tree edge)`,
          code:[8]
        });
      }
    }
    color[u]=2;
    steps.push({
      color:[...color],current:u,parent:{...parent},backEdge:null,done:false,hasCycle:false,
      explain:`Done with node <b>${u}</b> → mark BLACK\nNo back edges found from ${u}`,
      code:[10]
    });
    return false;
  }

  for(let i=0;i<n;i++){
    if(color[i]===0){
      if(dfs(i))break;
      if(cycleFound)break;
    }
  }
  // Final step
  steps.push({
    color:[...color],current:-1,parent:{...parent},backEdge:cycleFound?backEdge:null,done:true,hasCycle:cycleFound,
    explain:cycleFound
      ?`<b style="color:var(--pink)">✗ Cycle detected!</b> Back edge: ${backEdge[0]} ↔ ${backEdge[1]}\nThis edge connects to an ancestor — cycle confirmed.`
      :`<b style="color:var(--green)">✓ No cycle found.</b> All nodes finished BLACK.\nEvery neighbour was either tree-edge or parent → acyclic graph.`,
    code:[]
  });
  state.extra.cycleBackEdge=backEdge;
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>renderCycleU(fr);
}

function renderCycleU(fr){
  const{graphNodes:nodes,graphEdges:edges}=state.extra;
  if(!nodes)return;
  const{color,current,parent,backEdge,done,hasCycle}=fr;
  const cv=getCanvas(700,370);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);

  // Color palette for 3 states
  const nodeCol=c=>c===1?'#ffc107':c===2?'#00e676':'#1e3058'; // gray, black, white

  // Draw edges
  edges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b];
    const isBack=backEdge&&((backEdge[0]===a&&backEdge[1]===b)||(backEdge[0]===b&&backEdge[1]===a));
    const isTree=parent&&(parent[b]===a||parent[a]===b);
    ctx.strokeStyle=isBack?'#ff4081':isTree&&color[a]>=1&&color[b]>=1?'#00e67644':'#253d6a';
    ctx.lineWidth=isBack?3:isTree&&color[a]>=1&&color[b]>=1?2.5:1.8;
    if(isBack){ctx.setLineDash([6,3]);}else{ctx.setLineDash([]);}
    ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw nodes
  nodes.forEach((nd,i)=>{
    const col=nodeCol(color?color[i]:0);
    const isCur=current===i;
    const isBack=backEdge&&(backEdge[0]===i||backEdge[1]===i);
    const fillCol=isBack&&done?'#ff4081':col;
    ctx.beginPath();ctx.arc(nd.x,nd.y,20,0,Math.PI*2);
    ctx.fillStyle=fillCol+'cc';ctx.fill();
    ctx.strokeStyle=isCur?'#ffc107':isBack&&done?'#ff4081':fillCol;
    ctx.lineWidth=isCur?3:2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 12px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nd.label,nd.x,nd.y);
    // State label
    const stateLabel=color?['','GRAY','BLK'][color[i]]:'';
    if(stateLabel){
      ctx.fillStyle=nodeCol(color[i]);ctx.font='8px Fira Code';
      ctx.fillText(stateLabel,nd.x,nd.y+28);
    }
  });

  // Result banner
  if(done){
    const bannerCol=hasCycle?'rgba(255,64,129,.15)':'rgba(0,230,118,.12)';
    const textCol=hasCycle?'#ff4081':'#00e676';
    ctx.fillStyle=bannerCol;ctx.fillRect(10,338,680,26);
    ctx.fillStyle=textCol;ctx.font='bold 12px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(hasCycle?`✗ Cycle Found! Back edge: ${backEdge[0]} ↔ ${backEdge[1]}`:'✓ No Cycle — Graph is Acyclic',350,351);
  }

  // Legend
  ctx.textBaseline='top';
  [['#1e3058','WHITE (unvisited)'],['#ffc107','GRAY (in stack)'],['#00e676','BLACK (done)'],['#ff4081','Back edge']].forEach(([col,lbl],i)=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(20+i*160,16,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7099';ctx.font='10px Fira Code';ctx.fillText(lbl,32+i*160,11);
  });
  ensureGraphExplainPanel();
  if(fr.explain)updateGraphExplain(fr.explain,'');
}

// ═══════════════════════════════════════════
// CYCLE DETECTION — DIRECTED
// ═══════════════════════════════════════════
function _buildCycleDGraph(){
  const n=8;
  const cx=350,cy=195,rx=200,ry=145;
  const nodes=Array.from({length:n},(_,i)=>({
    id:i,x:cx+Math.cos(i/n*2*Math.PI-Math.PI/2)*rx+(Math.random()-.5)*16,
    y:cy+Math.sin(i/n*2*Math.PI-Math.PI/2)*ry+(Math.random()-.5)*12,label:i
  }));
  let edges=[];
  // Build a DAG backbone
  for(let i=1;i<n;i++){
    const src=Math.floor(Math.random()*i);
    edges.push([src,i]);
  }
  // Add a couple more forward edges
  for(let k=0;k<3;k++){
    const a=Math.floor(Math.random()*(n-1));
    const b=Math.floor(Math.random()*(n-a-1))+a+1;
    edges.push([a,b]);
  }
  // Add one back edge to guarantee a cycle
  edges.push([n-1,Math.floor(Math.random()*(n-2))]);
  // Deduplicate
  const eSet=new Set();edges=edges.filter(([u,v])=>{const k=u+','+v;if(eSet.has(k))return false;eSet.add(k);return true;});
  state.extra.graphNodes=nodes;state.extra.graphEdges=edges;
}

function initCycleD(){
  _buildCycleDGraph();
  genCycleDSteps();
  renderCycleD({color:Array(state.extra.graphNodes.length).fill(0),current:-1,backEdge:null,done:false,hasCycle:false});
  setStatus('Ready — click ▶ Start');
}

function genCycleDSteps(){
  const{graphNodes:nodes,graphEdges:edges}=state.extra;
  if(!nodes)return;
  const n=nodes.length;
  const adj=Array.from({length:n},()=>[]);
  edges.forEach(([a,b])=>adj[a].push(b));
  // 0=WHITE 1=GRAY 2=BLACK
  const color=Array(n).fill(0);
  const steps=[];
  let cycleFound=false,backEdge=null;

  function dfs(u){
    color[u]=1;
    steps.push({
      color:[...color],current:u,backEdge:null,done:false,hasCycle:false,
      explain:`Visit node <b style="color:var(--amber)">${u}</b> → color = GRAY (on recursion stack)\nGray means: currently being explored`,
      code:[4,5]
    });
    for(const v of adj[u]){
      if(color[v]===1){
        // Back edge
        cycleFound=true;backEdge=[u,v];
        steps.push({
          color:[...color],current:u,backEdge:[u,v],done:false,hasCycle:true,
          explain:`From <b style="color:var(--pink)">${u}</b> → <b style="color:var(--pink)">${v}</b>: neighbor is GRAY!\n<b style="color:var(--pink)">Back edge detected → Cycle: ${v} → … → ${u} → ${v}</b>`,
          code:[6,7,8]
        });
        return true;
      }
      if(color[v]===0){
        steps.push({
          color:[...color],current:u,backEdge:null,done:false,hasCycle:false,
          explain:`From <b>${u}</b> → <b style="color:var(--purple)">${v}</b>: WHITE → recurse DFS(${v})`,
          code:[9,10,11]
        });
        if(dfs(v))return true;
        if(cycleFound)return true;
      } else {
        steps.push({
          color:[...color],current:u,backEdge:null,done:false,hasCycle:false,
          explain:`From <b>${u}</b> → <b>${v}</b>: BLACK (already fully explored) → safe, skip`,
          code:[6]
        });
      }
    }
    color[u]=2;
    steps.push({
      color:[...color],current:u,backEdge:null,done:false,hasCycle:false,
      explain:`Node <b>${u}</b> fully explored → color = BLACK\nAll outgoing edges checked, no back edge from ${u}`,
      code:[11,12]
    });
    return false;
  }

  for(let i=0;i<n;i++){
    if(color[i]===0){
      if(dfs(i))break;
      if(cycleFound)break;
    }
  }

  steps.push({
    color:[...color],current:-1,backEdge:cycleFound?backEdge:null,done:true,hasCycle:cycleFound,
    explain:cycleFound
      ?`<b style="color:var(--pink)">✗ Cycle detected!</b> Back edge: ${backEdge[0]} → ${backEdge[1]}\nNode ${backEdge[1]} was GRAY when reached from ${backEdge[0]} — still on the call stack.`
      :`<b style="color:var(--green)">✓ No cycle found.</b> All nodes are BLACK.\nThis is a valid DAG (Directed Acyclic Graph).`,
    code:[]
  });
  state.extra.cycleBackEdge=backEdge;
  state.steps=steps;state.stepIdx=0;
  state.renderFn=fr=>renderCycleD(fr);
}

function renderCycleD(fr){
  const{graphNodes:nodes,graphEdges:edges}=state.extra;
  if(!nodes)return;
  const{color,current,backEdge,done,hasCycle}=fr;
  const cv=getCanvas(700,370);const ctx=cv.getContext('2d');
  ctx.fillStyle='#060b14';ctx.fillRect(0,0,cv.width,cv.height);

  const nodeCol=c=>c===1?'#ffc107':c===2?'#00e676':'#1e3058';

  // Draw directed edges (with arrowheads)
  edges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b];
    const isBack=backEdge&&backEdge[0]===a&&backEdge[1]===b;
    const bothDone=color&&color[a]>=1&&color[b]>=1;
    ctx.strokeStyle=isBack?'#ff4081':bothDone&&!isBack?'#00e67644':'#253d6a';
    ctx.lineWidth=isBack?3:bothDone?2.5:1.8;
    if(isBack){ctx.setLineDash([6,3]);}else{ctx.setLineDash([]);}
    // Shorten line to not overlap node circle
    const dx=nb.x-na.x,dy=nb.y-na.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const ux=dx/len,uy=dy/len;
    const ex=nb.x-ux*22,ey=nb.y-uy*22;
    ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.setLineDash([]);
    // Arrowhead
    const arrowCol=isBack?'#ff4081':bothDone?'#00e67644':'#253d6a';
    ctx.fillStyle=arrowCol;
    ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-uy*7-ux*12,ey+ux*7-uy*12);
    ctx.lineTo(ex+uy*7-ux*12,ey-ux*7-uy*12);
    ctx.fill();
  });

  // Draw nodes
  nodes.forEach((nd,i)=>{
    const col=nodeCol(color?color[i]:0);
    const isCur=current===i;
    const isBackNode=backEdge&&(backEdge[0]===i||backEdge[1]===i)&&done;
    const fillCol=isBackNode?'#ff4081':col;
    ctx.beginPath();ctx.arc(nd.x,nd.y,20,0,Math.PI*2);
    ctx.fillStyle=fillCol+'cc';ctx.fill();
    ctx.strokeStyle=isCur?'#fff':isBackNode?'#ff4081':fillCol;
    ctx.lineWidth=isCur?3:2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 12px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nd.label,nd.x,nd.y);
    const stateLabel=color?['','GRAY','BLK'][color[i]]:'';
    if(stateLabel){
      ctx.fillStyle=nodeCol(color[i]);ctx.font='8px Fira Code';
      ctx.fillText(stateLabel,nd.x,nd.y+28);
    }
  });

  // Result banner
  if(done){
    const bannerCol=hasCycle?'rgba(255,64,129,.15)':'rgba(0,230,118,.12)';
    const textCol=hasCycle?'#ff4081':'#00e676';
    ctx.fillStyle=bannerCol;ctx.fillRect(10,338,680,26);
    ctx.fillStyle=textCol;ctx.font='bold 12px Fira Code';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(hasCycle?`✗ Cycle Found! Back edge: ${backEdge[0]} → ${backEdge[1]}`:'✓ No Cycle — This is a Valid DAG',350,351);
  }

  // Legend
  ctx.textBaseline='top';
  [['#1e3058','WHITE (unvisited)'],['#ffc107','GRAY (in stack)'],['#00e676','BLACK (done)'],['#ff4081','Back edge']].forEach(([col,lbl],i)=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(20+i*160,16,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7099';ctx.font='10px Fira Code';ctx.fillText(lbl,32+i*160,11);
  });
  ensureGraphExplainPanel();
  if(fr.explain)updateGraphExplain(fr.explain,'');
}
