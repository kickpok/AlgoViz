<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoViz — Algorithm Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060b14;--surface:#0d1526;--surface2:#111e35;--border:#1e3058;
  --cyan:#00e5ff;--amber:#ffc107;--green:#00e676;--pink:#ff4081;--purple:#ce93d8;
  --text:#cdd8f0;--text-dim:#5a7099;
  --font-mono:'Fira Code',monospace;--font-head:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* TOPBAR */
.topbar{display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:16px;z-index:100;}
.logo{font-family:var(--font-head);font-size:21px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{-webkit-text-fill-color:var(--amber);}
.tagline{font-size:11px;color:var(--text-dim);border-left:1px solid var(--border);padding-left:16px;}
.sb-hint{margin-left:auto;font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.sb-hint-arrow{display:inline-block;animation:nudge 2s ease-in-out infinite;}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;position:relative;}
/* SIDEBAR WRAP */
.sidebar-wrap{width:38px;flex-shrink:0;position:relative;z-index:80;}
.sidebar{
  position:absolute;left:0;top:0;height:100%;width:38px;
  background:var(--surface);border-right:1px solid var(--border);
  overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1),box-shadow .28s;
  display:flex;flex-direction:column;
}
.sidebar-wrap:hover .sidebar{
  width:244px;
  box-shadow:8px 0 32px rgba(0,0,0,.55);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.sidebar-wrap:hover .sidebar::-webkit-scrollbar{width:3px;}
.sidebar-wrap:hover .sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sb-icons{display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;min-width:38px;transition:opacity .15s;flex-shrink:0;}
.sidebar-wrap:hover .sb-icons{opacity:0;pointer-events:none;height:0;overflow:hidden;padding:0;}
.cat-icon-pill{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--text-dim);transition:all .15s;}
.cat-icon-pill:hover{background:var(--surface2);color:var(--cyan);}
.cat-icon-pill.has-active{color:var(--cyan);}
.sb-list{min-width:244px;opacity:0;transition:opacity .18s .12s;pointer-events:none;flex-shrink:0;}
.sidebar-wrap:hover .sb-list{opacity:1;pointer-events:auto;}
.cat-header{padding:11px 16px 5px;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;font-family:var(--font-head);white-space:nowrap;}
.algo-item{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:11.5px;cursor:pointer;color:var(--text-dim);transition:all .15s;border-left:2px solid transparent;white-space:nowrap;}
.algo-item:hover{background:var(--surface2);color:var(--text);}
.algo-item.active{background:rgba(0,229,255,.07);color:var(--cyan);border-left:2px solid var(--cyan);}
.algo-item .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.cat-divider{height:1px;background:var(--border);margin:5px 0;}
.subcat-header{padding:6px 16px 3px 22px;font-size:9px;letter-spacing:1.8px;color:var(--amber);text-transform:uppercase;font-family:var(--font-head);white-space:nowrap;opacity:.75;}
.algo-item.subcat-item{padding-left:26px;font-size:11px;}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.algo-header{padding:14px 22px 10px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;flex-shrink:0;}
.algo-title{font-family:var(--font-head);font-size:19px;font-weight:700;color:var(--cyan);}
.algo-badge{padding:3px 10px;border-radius:20px;font-size:10px;background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2);}
.algo-desc{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.6;}
/* CONTROLS */
.controls{display:flex;align-items:center;gap:8px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;flex-wrap:wrap;}
.btn{padding:5px 13px;border-radius:4px;border:none;font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--cyan);color:#000;}
.btn-primary:hover{background:#33eaff;}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-danger{background:transparent;color:var(--pink);border:1px solid rgba(255,64,129,.3);}
.btn-danger:hover{background:rgba(255,64,129,.1);}
.btn-arena{background:rgba(206,147,216,.1);color:var(--purple);border:1px solid rgba(206,147,216,.25);}
.btn-arena:hover,.btn-arena.active{background:rgba(206,147,216,.22);border-color:var(--purple);box-shadow:0 0 8px rgba(206,147,216,.25);}
.btn-step{padding:5px 9px;font-size:13px;background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-step:hover{color:var(--cyan);border-color:var(--cyan);}
.btn-input{background:rgba(0,229,255,.07);color:var(--cyan);border:1px solid rgba(0,229,255,.2);font-size:10px;}
.btn-input:hover,.btn-input.active{background:rgba(0,229,255,.15);border-color:var(--cyan);}
.btn-mode{background:transparent;color:var(--text-dim);border:1px solid var(--border);font-size:10px;padding:4px 10px;}
.btn-mode.active{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.4);}
.ctrl-sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0;}
.ctrl-label{font-size:10px;color:var(--text-dim);}
.ctrl-group{display:flex;align-items:center;gap:6px;}
input[type=range]{-webkit-appearance:none;width:88px;height:3px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--cyan);cursor:pointer;}
input[type=number],input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-family:var(--font-mono);font-size:11px;width:80px;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--cyan);}
.status-badge{padding:3px 10px;border-radius:20px;font-size:10px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);white-space:nowrap;}
.status-badge.running{background:rgba(255,193,7,.1);color:var(--amber);border-color:rgba(255,193,7,.2);}
.status-badge.error{background:rgba(255,64,129,.1);color:var(--pink);border-color:rgba(255,64,129,.2);}
/* CUSTOM INPUT PANEL */
#input-panel{display:none;border-bottom:1px solid var(--border);background:#07101f;flex-shrink:0;overflow:hidden;}
#input-panel.open{display:flex;flex-direction:column;}
.input-panel-inner{padding:10px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
.input-panel-inner .field-group{display:flex;align-items:center;gap:6px;}
.input-panel-inner label{font-size:10px;color:var(--text-dim);}
.input-panel-inner input[type=text]{width:220px;}
.input-panel-inner .hint{font-size:9px;color:var(--text-dim);font-style:italic;}
.apply-btn{padding:5px 13px;border-radius:4px;border:none;background:var(--purple);color:#000;font-family:var(--font-mono);font-size:11px;cursor:pointer;font-weight:600;}
.apply-btn:hover{background:#d9a8e8;}
.input-error{font-size:10px;color:var(--pink);padding:0 18px 8px;display:none;}
/* VIZ */
.viz-body{flex:1;display:flex;overflow:hidden;}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;}
canvas{display:block;max-width:100%;}
/* CODE PANEL */
.code-panel{width:272px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.code-panel-head{padding:8px 13px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-head);}
.code-content{flex:1;overflow-y:auto;padding:10px 13px;font-size:11px;line-height:1.85;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.code-content::-webkit-scrollbar{width:3px;}
.code-content::-webkit-scrollbar-thumb{background:var(--border);}
.code-line{padding:1px 3px;border-radius:2px;transition:background .12s;}
.code-line.highlight{background:rgba(0,229,255,.13);color:var(--cyan);}
.kw{color:var(--purple);}
.fn{color:var(--cyan);}
.cm{color:var(--text-dim);}
.num{color:var(--amber);}
.str{color:var(--green);}
.info-panel{padding:9px 13px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);line-height:1.75;}
.info-panel b{color:var(--amber);}
/* EDGE CASES */
.edge-panel{padding:8px 13px 10px;border-top:1px solid var(--border);}
.edge-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);font-family:var(--font-head);margin-bottom:5px;opacity:.7;}
.edge-case{font-size:9.5px;color:var(--text-dim);padding:2px 0 2px 7px;border-left:2px solid rgba(255,193,7,.2);margin-bottom:3px;line-height:1.55;}
/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--text-dim);}
.welcome-icon{font-size:46px;opacity:.2;}
.welcome h2{font-family:var(--font-head);color:var(--text);font-size:18px;}
.welcome p{font-size:11.5px;text-align:center;max-width:370px;line-height:1.7;}
/* GRID */
.grid-container{display:inline-grid;gap:2px;user-select:none;}
.grid-cell{width:22px;height:22px;border-radius:2px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:background .07s;}
.grid-cell.wall{background:#253a6e;border-color:#253a6e;}
.grid-cell.start{background:var(--green);border-color:var(--green);}
.grid-cell.end{background:var(--pink);border-color:var(--pink);}
.grid-cell.visited{background:rgba(0,229,255,.22);border-color:rgba(0,229,255,.35);}
.grid-cell.path{background:var(--amber);border-color:var(--amber);}
.grid-cell.frontier{background:rgba(206,147,216,.35);border-color:var(--purple);}
/* GRAPH EXPLAIN PANEL */
.graph-explain-wrap{width:100%;margin-top:8px;flex-shrink:0;}
.graph-path-bar{background:#0a1628;border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-size:11px;color:var(--amber);font-family:var(--font-mono);min-height:26px;letter-spacing:.5px;}
.graph-backend{background:#07101f;border:1px solid var(--border);border-radius:4px;padding:8px 12px;margin-top:5px;min-height:68px;position:relative;overflow:hidden;}
.graph-backend-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-head);margin-bottom:5px;}
.graph-explain-line{font-size:10.5px;font-family:var(--font-mono);line-height:1.65;transition:opacity .35s,transform .35s;margin-bottom:1px;}
.graph-explain-line.old{opacity:.28;transform:translateY(-2px);}
.graph-explain-line.cur{color:var(--cyan);font-weight:600;}
.graph-explain-line.prev{color:var(--text-dim);}
.ds-badge{display:inline-block;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);border-radius:3px;padding:0 5px;font-size:10px;color:var(--cyan);}
/* DP TABLE */
.dp-table{border-collapse:collapse;font-size:11px;}
.dp-table td,.dp-table th{width:30px;height:27px;text-align:center;border:1px solid var(--border);transition:all .18s;}
.dp-table th{background:var(--surface2);color:var(--text-dim);font-weight:500;}
.dp-table td{background:var(--surface);}
.dp-table td.active{background:rgba(0,229,255,.2);color:var(--cyan);}
.dp-table td.done{background:rgba(0,230,118,.1);color:var(--green);}
.dp-table td.highlight{background:rgba(255,193,7,.15);color:var(--amber);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Algo<span>Viz</span></div>
  <div class="tagline">Interactive Algorithm Visualizer &bull; 25 Algorithms</div>
  <div class="sb-hint"><span class="sb-hint-arrow">›</span> hover left edge to browse</div>
</div>
<div class="layout">
  <div class="sidebar-wrap" id="sidebar-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sb-icons" id="sb-icons"></div>
      <div class="sb-list" id="sb-list"></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⬡</div>
      <h2>Pick an Algorithm</h2>
      <p>Hover the left edge → choose from 23 algorithms. Every visualizer supports <b style="color:var(--purple)">Arena mode</b> — step forward &amp; backward through any animation.</p>
    </div>
    <div id="algo-view" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="algo-header">
        <div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="algo-title" id="av-title"></div>
            <div class="algo-badge" id="av-badge"></div>
          </div>
          <div class="algo-desc" id="av-desc"></div>
        </div>
      </div>
      <div class="controls" id="av-controls"></div>
      <div id="input-panel">
        <div class="input-panel-inner" id="input-panel-inner"></div>
        <div class="input-error" id="input-error"></div>
      </div>
      <div class="viz-body">
        <div class="canvas-area" id="av-canvas" style="flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12px;"></div>
        <div class="code-panel">
          <div class="code-panel-head">Pseudocode</div>
          <div class="code-content" id="av-code"></div>
          <div class="info-panel" id="av-info"></div>
          <div class="edge-panel" id="av-edges" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════
// ALGORITHM REGISTRY  (with edge cases)
// ═══════════════════════════════════════════
const ALGOS = {
  bubble:{name:"Bubble Sort",cat:"Sorting",badge:"O(n²)",desc:"Repeatedly swap adjacent elements if out of order. Stops early if no swaps.",type:"sort",
    code:["<span class='kw'>function</span> <span class='fn'>bubbleSort</span>(arr):","  n = arr.length","  <span class='kw'>for</span> i = 0 <span class='kw'>to</span> n-1:","    swapped = <span class='kw'>false</span>","    <span class='kw'>for</span> j = 0 <span class='kw'>to</span> n-i-2:","      <span class='kw'>if</span> arr[j] > arr[j+1]:","        swap(arr[j], arr[j+1])","        swapped = <span class='kw'>true</span>","    <span class='kw'>if</span> !swapped: <span class='kw'>break</span>","  <span class='kw'>return</span> arr"],
    info:"<b>Time:</b> O(n²) avg/worst &bull; O(n) best<br><b>Space:</b> O(1)<br><b>Stable:</b> Yes",
    cases:["Already sorted → O(n) due to early exit","All equal → max comparisons, zero swaps","Reverse sorted → worst case n(n-1)/2 swaps","Single element → returns immediately"]},
  merge:{name:"Merge Sort",cat:"Sorting",badge:"O(n log n)",desc:"Divide array recursively then merge sorted halves. Stable, consistent O(n log n).",type:"sort",
    code:["<span class='kw'>function</span> <span class='fn'>mergeSort</span>(arr):","  <span class='kw'>if</span> arr.length <= 1: <span class='kw'>return</span>","  mid = arr.length / 2","  left  = mergeSort(arr[0..mid])","  right = mergeSort(arr[mid..])","  <span class='kw'>return</span> <span class='fn'>merge</span>(left, right)","","<span class='kw'>function</span> <span class='fn'>merge</span>(L, R):","  result = []","  <span class='kw'>while</span> L and R not empty:","    <span class='kw'>if</span> L[0] <= R[0]: result.push(L.shift())","    <span class='kw'>else</span>: result.push(R.shift())","  <span class='kw'>return</span> [...result, ...L, ...R]"],
    info:"<b>Time:</b> O(n log n) all cases<br><b>Space:</b> O(n) auxiliary<br><b>Stable:</b> Yes",
    cases:["Single element → base case, returns immediately","Already sorted → still splits and merges fully","Odd-length arrays → ceil/floor split, handled correctly","Stack depth: O(log n) recursive calls"]},
  quick:{name:"Quick Sort",cat:"Sorting",badge:"O(n log n)",desc:"Pick pivot, partition around it, recursively sort sub-arrays.",type:"sort",
    code:["<span class='kw'>function</span> <span class='fn'>quickSort</span>(arr, lo, hi):","  <span class='kw'>if</span> lo >= hi: <span class='kw'>return</span>","  p = <span class='fn'>partition</span>(arr, lo, hi)","  quickSort(arr, lo, p-1)","  quickSort(arr, p+1, hi)","","<span class='kw'>function</span> <span class='fn'>partition</span>(arr, lo, hi):","  pivot = arr[hi]","  i = lo - 1","  <span class='kw'>for</span> j = lo <span class='kw'>to</span> hi-1:","    <span class='kw'>if</span> arr[j] <= pivot: i++; swap(arr[i],arr[j])","  swap(arr[i+1], arr[hi])","  <span class='kw'>return</span> i + 1"],
    info:"<b>Time:</b> O(n log n) avg &bull; O(n²) worst<br><b>Space:</b> O(log n)<br><b>Stable:</b> No",
    cases:["Sorted array with last-element pivot → O(n²) worst case","All equal elements → O(n²) without 3-way partition","Random pivot selection reduces worst-case probability","Duplicate values → partition still correct"]},
  heap:{name:"Heap Sort",cat:"Sorting",badge:"O(n log n)",desc:"Build a max-heap then repeatedly extract maximum. In-place, O(n log n) guaranteed.",type:"sort",
    code:["<span class='kw'>function</span> <span class='fn'>heapSort</span>(arr):","  n = arr.length","  <span class='kw'>for</span> i = n/2-1 <span class='kw'>downto</span> 0: heapify(arr,n,i)","  <span class='kw'>for</span> i = n-1 <span class='kw'>downto</span> 1:","    swap(arr[0], arr[i])","    heapify(arr, i, 0)","","<span class='kw'>function</span> <span class='fn'>heapify</span>(arr, n, i):","  largest = i","  l = 2*i+1, r = 2*i+2","  <span class='kw'>if</span> l<n and arr[l]>arr[largest]: largest=l","  <span class='kw'>if</span> r<n and arr[r]>arr[largest]: largest=r","  <span class='kw'>if</span> largest != i: swap; heapify(arr,n,largest)"],
    info:"<b>Time:</b> O(n log n) all cases<br><b>Space:</b> O(1)<br><b>Stable:</b> No",
    cases:["Build phase is O(n) — a non-obvious fact","Not stable: equal elements may change relative order","Single element → heapify is a no-op","All equal → valid max-heap on first pass, no swaps during extract"]},
  sliding:{name:"Sliding Window",cat:"Array",badge:"O(n)",desc:"Fixed-size window slides over array finding max sum of k consecutive elements.",type:"array_sw",
    code:["<span class='kw'>function</span> <span class='fn'>maxSumWindow</span>(arr, k):","  <span class='kw'>if</span> n < k: <span class='kw'>return</span> error","  sum = Σ arr[0..k-1]","  max = sum; maxStart = 0","  <span class='kw'>for</span> i = 1 <span class='kw'>to</span> n-k:","    sum += arr[i+k-1]","    sum -= arr[i-1]","    <span class='kw'>if</span> sum > max: max=sum; maxStart=i","  <span class='kw'>return</span> max, maxStart"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(1)<br><b>Use case:</b> Subarray sums, max lengths",
    cases:["k > array length → invalid, must guard","k = array length → window covers entire array","k = 1 → trivial, max sum = max element","All negatives → max sum = least-negative window","k = 0 → undefined, must reject"]},
  twoptr:{name:"Two Pointer",cat:"Array",badge:"O(n)",desc:"Pointers from both ends converge to find pair summing to target in sorted array.",type:"array_tp",
    code:["<span class='kw'>function</span> <span class='fn'>twoSum</span>(arr, target):","  left = 0; right = arr.length - 1","  <span class='kw'>while</span> left < right:","    sum = arr[left] + arr[right]","    <span class='kw'>if</span> sum == target: <span class='kw'>return</span> [left, right]","    <span class='kw'>else if</span> sum < target: left++","    <span class='kw'>else</span>: right--","  <span class='kw'>return</span> -1  <span class='cm'>// not found</span>"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(1)<br><b>Requires:</b> Sorted array",
    cases:["Array not sorted → wrong results, must sort first","No pair sums to target → pointers meet, return -1","Target < 2×min or > 2×max → impossible immediately","Duplicates in array → pairs with duplicates work correctly"]},
  kadane:{name:"Kadane's Algorithm",cat:"Array",badge:"O(n)",desc:"Maximum subarray sum in a single pass. Resets the running sum whenever extending would hurt.",type:"array_kadane",
    code:["<span class='kw'>function</span> <span class='fn'>kadane</span>(arr):","  maxSum = curSum = arr[0]","  start = end = 0","  <span class='kw'>for</span> i = 1 <span class='kw'>to</span> n-1:","    <span class='kw'>if</span> curSum + arr[i] < arr[i]:","      curSum = arr[i]  <span class='cm'>// reset window</span>","    <span class='kw'>else</span>: curSum += arr[i]  <span class='cm'>// extend</span>","    <span class='kw'>if</span> curSum > maxSum:","      maxSum = curSum","      start..end updated","  <span class='kw'>return</span> maxSum, arr[start..end]"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(1)<br><b>Use:</b> Stock profit, signal peaks",
    cases:["All negatives → maxSum = the least-negative element","Single element → trivially returned as-is","All zeros → maxSum = 0","Large alternating +/− → window resets frequently","Multiple equal max subarrays → leftmost is returned"]},
  boyermoore:{name:"Boyer-Moore Vote",cat:"Array",badge:"O(n)",desc:"Find the majority element (>n/2 occurrences) in two linear passes using O(1) space.",type:"array_bm",
    code:["<span class='kw'>function</span> <span class='fn'>majorityVote</span>(arr):","  candidate=<span class='kw'>null</span>; count=0","  <span class='kw'>for</span> x <span class='kw'>in</span> arr:  <span class='cm'>// Phase 1</span>","    <span class='kw'>if</span> count == 0:","      candidate=x; count=1","    <span class='kw'>else if</span> x == candidate: count++","    <span class='kw'>else</span>: count--","  <span class='cm'>// Phase 2: verify</span>","  votes = count(arr, candidate)","  <span class='kw'>return</span> candidate <span class='kw'>if</span> votes > n/2","  <span class='kw'>else</span>: <span class='kw'>return</span> <span class='kw'>null</span>"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(1)<br><b>Requires:</b> Phase 2 for guaranteed correctness",
    cases:["No majority → Phase 2 catches the false positive","Entire array same value → candidate set on first element","n=1 → trivially the majority","Even 50/50 split → no majority, Phase 2 rejects","Works when majority element value is 0"]},
  bfs_path:{name:"BFS Pathfinding",cat:"Pathfinding",badge:"Shortest Path",desc:"Explores level by level — guarantees shortest path on unweighted grids.",type:"grid",algo:"bfs",
    code:["<span class='kw'>function</span> <span class='fn'>BFS</span>(grid, start, end):","  queue = [start]","  visited = {start: null}","  <span class='kw'>while</span> queue not empty:","    node = queue.shift()","    <span class='kw'>if</span> node == end: <span class='kw'>break</span>","    <span class='kw'>for</span> nb <span class='kw'>in</span> getNeighbors(node):","      <span class='kw'>if</span> nb not in visited:","        visited[nb] = node; queue.push(nb)","  <span class='kw'>return</span> reconstructPath(visited, end)"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V)<br><b>Optimal:</b> Yes (unweighted)",
    cases:["Start = End → path length 0","End blocked by walls → no path found","Multiple shortest paths → BFS finds one deterministically","Large grid → memory O(V) can be significant"]},
  dfs_path:{name:"DFS Pathfinding",cat:"Pathfinding",badge:"Explores Deep",desc:"Goes as deep as possible before backtracking. Does NOT guarantee shortest path.",type:"grid",algo:"dfs",
    code:["<span class='kw'>function</span> <span class='fn'>DFS</span>(grid, start, end):","  stack = [start]","  visited = {start: null}","  <span class='kw'>while</span> stack not empty:","    node = stack.pop()","    <span class='kw'>if</span> node == end: <span class='kw'>break</span>","    <span class='kw'>for</span> nb <span class='kw'>in</span> getNeighbors(node):","      <span class='kw'>if</span> nb not in visited:","        visited[nb] = node; stack.push(nb)","  <span class='kw'>return</span> reconstructPath(visited, end)"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V)<br><b>Optimal:</b> No",
    cases:["May find a very long path when a short one exists","End unreachable → stack empties, no path","Must track visited to avoid infinite loops in cycles","Start = End → found in first iteration"]},
  dijkstra:{name:"Dijkstra's",cat:"Pathfinding",badge:"Weighted",desc:"Greedy shortest path on weighted graphs via priority queue.",type:"grid",algo:"dijkstra",
    code:["<span class='kw'>function</span> <span class='fn'>dijkstra</span>(grid, start, end):","  dist = {start:0, rest:∞}","  pq = MinHeap([(0, start)])","  <span class='kw'>while</span> pq not empty:","    (d, node) = pq.pop()","    <span class='kw'>if</span> node==end: <span class='kw'>break</span>","    <span class='kw'>for</span> (nb,w) in neighbors(node):","      nd = d + w","      <span class='kw'>if</span> nd < dist[nb]:","        dist[nb]=nd; pq.push((nd,nb))"],
    info:"<b>Time:</b> O((V+E) log V)<br><b>Space:</b> O(V)<br><b>Optimal:</b> Yes (non-neg weights)",
    cases:["Negative weights → wrong results, use Bellman-Ford","All weights equal → degenerates to BFS","End unreachable → dist[end] stays ∞","Dense vs sparse graphs → different efficiency trade-offs"]},
  astar:{name:"A* Search",cat:"Pathfinding",badge:"Heuristic",desc:"Dijkstra + Manhattan heuristic. Fastest when good heuristic is available.",type:"grid",algo:"astar",
    code:["<span class='kw'>function</span> <span class='fn'>aStar</span>(grid, start, end):","  g={start:0}; h=manhattan(start,end)","  open=MinHeap([(g+h, start)])","  <span class='kw'>while</span> open not empty:","    (_,node)=open.pop()","    <span class='kw'>if</span> node==end: <span class='kw'>break</span>","    <span class='kw'>for</span> nb in neighbors(node):","      ng = g[node]+1","      <span class='kw'>if</span> ng < g[nb]:","        g[nb]=ng; open.push((ng+h(nb,end),nb))"],
    info:"<b>Time:</b> O(E log V)<br><b>Space:</b> O(V)<br><b>Optimal:</b> Yes (admissible h)",
    cases:["Inadmissible heuristic → may return suboptimal path","h=0 everywhere → reduces to Dijkstra","h = exact cost → explores minimal nodes (ideal)","End unreachable → open set empties, no solution"]},
  graph_bfs:{name:"Graph BFS",cat:"Graph",subcat:"Graph Traversal",badge:"O(V+E)",desc:"Breadth-first traversal. Visits all neighbours before going deeper.",type:"graph",algo:"bfs",
    code:["<span class='kw'>function</span> <span class='fn'>BFS</span>(graph, start):","  visited=Set([start]); queue=[start]","  order=[]","  <span class='kw'>while</span> queue not empty:","    node=queue.shift(); order.push(node)","    <span class='kw'>for</span> nb in graph[node]:","      <span class='kw'>if</span> nb not in visited:","        visited.add(nb); queue.push(nb)","  <span class='kw'>return</span> order"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V)<br><b>Use:</b> Shortest path, level order",
    cases:["Disconnected graph → only nodes reachable from start visited","Single node → returns [start] immediately","Dense graph → queue may hold O(V) nodes at once","Self-loops → must check visited before enqueuing"]},
  graph_dfs:{name:"Graph DFS",cat:"Graph",subcat:"Graph Traversal",badge:"O(V+E)",desc:"Depth-first traversal. Explores as deep as possible before backtracking.",type:"graph",algo:"dfs",
    code:["<span class='kw'>function</span> <span class='fn'>DFS</span>(graph, node, visited):","  visited.add(node); order.push(node)","  <span class='kw'>for</span> nb in graph[node]:","    <span class='kw'>if</span> nb not in visited:","      DFS(graph, nb, visited)"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V) stack<br><b>Use:</b> Topological sort, cycle detect",
    cases:["Very deep graph → recursive DFS risks stack overflow","Back edges → indicate cycles in directed graphs","Disconnected graph → must loop over all nodes","Single node → trivially visited and returned"]},
  topo:{name:"Topological Sort",cat:"Graph",subcat:"Graph Traversal",badge:"DAG",desc:"Linear ordering of DAG vertices. Every edge u→v has u before v. Kahn's algorithm.",type:"graph",algo:"topo",
    code:["<span class='kw'>function</span> <span class='fn'>topoSort</span>(graph):","  inDeg=count incoming edges","  queue=nodes with inDeg==0","  result=[]","  <span class='kw'>while</span> queue not empty:","    node=queue.shift(); result.push(node)","    <span class='kw'>for</span> nb in graph[node]:","      inDeg[nb]--","      <span class='kw'>if</span> inDeg[nb]==0: queue.push(nb)","  <span class='kw'>return</span> result"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V)<br><b>Use:</b> Build systems, scheduling",
    cases:["Cycle exists → no valid topological order (detect: result.length < V)","Multiple valid orderings → Kahn's gives one based on queue order","Disconnected DAG → nodes with no incoming edges from all components start","Single source → always appears first in output"]},
  dsu:{name:"Disjoint Set Union",cat:"Graph",subcat:"Graph Traversal",badge:"Near O(1)",desc:"Union-Find with path compression + rank union. Tracks connected components.",type:"dsu",
    code:["<span class='kw'>function</span> <span class='fn'>find</span>(parent, x):","  <span class='kw'>if</span> parent[x]!=x:","    parent[x]=find(parent,parent[x])","  <span class='kw'>return</span> parent[x]","","<span class='kw'>function</span> <span class='fn'>union</span>(parent, rank, x, y):","  rx=find(x); ry=find(y)","  <span class='kw'>if</span> rx==ry: <span class='kw'>return</span>","  <span class='kw'>if</span> rank[rx]<rank[ry]: swap(rx,ry)","  parent[ry]=rx","  <span class='kw'>if</span> rank[rx]==rank[ry]: rank[rx]++"],
    info:"<b>Time:</b> O(α(n)) per op<br><b>Space:</b> O(n)<br><b>Use:</b> MST, connected components",
    cases:["Union of already-connected nodes → find returns same root, no-op","Self-union (x,x) → correctly ignored","Without path compression → O(log n) per op","α(n) ≤ 4 for any practical n — effectively O(1)"]},
  cycle_undirected:{name:"Cycle — Undirected",cat:"Graph",subcat:"Cycles",badge:"O(V+E)",desc:"Detect a cycle in an undirected graph via DFS. A back edge (visited neighbour ≠ parent) signals a cycle.",type:"cycle_u",
    code:["<span class='kw'>function</span> <span class='fn'>hasCycle</span>(graph, n):","  visited = Set()","  <span class='kw'>function</span> <span class='fn'>dfs</span>(node, parent):","    visited.add(node)","    <span class='kw'>for</span> nb in graph[node]:","      <span class='kw'>if</span> nb not in visited:","        <span class='kw'>if</span> dfs(nb, node): <span class='kw'>return true</span>","      <span class='kw'>else if</span> nb != parent:","        <span class='kw'>return true</span>  <span class='cm'>// back edge!</span>","    <span class='kw'>return false</span>","  <span class='kw'>for</span> i = 0 to n-1:","    <span class='kw'>if</span> i not in visited:","      <span class='kw'>if</span> dfs(i, -1): <span class='kw'>return true</span>","  <span class='kw'>return false</span>"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V) stack<br><b>Back edge:</b> visited & ≠ parent",
    cases:["Self-loop (u,u) → immediately triggers back-edge condition","Single node, no edges → no cycle","Tree (n-1 edges) → no cycle, every edge is a tree edge","Adding one edge to a tree → always creates exactly one cycle","Disconnected graph → DFS restarts from each unvisited component"]},
  cycle_directed:{name:"Cycle — Directed",cat:"Graph",subcat:"Cycles",badge:"O(V+E)",desc:"Detect a cycle in a directed graph using 3-colour DFS. A grey→grey back edge confirms a cycle.",type:"cycle_d",
    code:["<span class='cm'>// 0=WHITE 1=GRAY 2=BLACK</span>","<span class='kw'>function</span> <span class='fn'>hasCycle</span>(graph, n):","  color = Array(n).fill(<span class='num'>0</span>)","  <span class='kw'>function</span> <span class='fn'>dfs</span>(u):","    color[u] = <span class='num'>1</span>  <span class='cm'>// GRAY: in stack</span>","    <span class='kw'>for</span> v in graph[u]:","      <span class='kw'>if</span> color[v] == <span class='num'>1</span>:","        <span class='kw'>return true</span>  <span class='cm'>// back edge!</span>","      <span class='kw'>if</span> color[v] == <span class='num'>0</span>:","        <span class='kw'>if</span> dfs(v): <span class='kw'>return true</span>","    color[u] = <span class='num'>2</span>  <span class='cm'>// BLACK: done</span>","    <span class='kw'>return false</span>","  <span class='kw'>for</span> i = 0 to n-1:","    <span class='kw'>if</span> color[i]==<span class='num'>0</span> and dfs(i): <span class='kw'>return true</span>","  <span class='kw'>return false</span>"],
    info:"<b>Time:</b> O(V+E)<br><b>Space:</b> O(V)<br><b>Gray node:</b> currently on recursion stack",
    cases:["Undirected graph — use the undirected variant instead","Single node self-loop → cycle detected immediately","DAG (no cycle) → all nodes finish BLACK, returns false","Back edge only (not cross/forward) indicates a cycle in directed graph","Disconnected → DFS restarts from every WHITE node"]},
  bst:{name:"BST Operations",cat:"Tree",badge:"O(log n)",desc:"Binary Search Tree: insert, search and delete with animated tree updates.",type:"tree",
    code:["<span class='kw'>function</span> <span class='fn'>insert</span>(node, val):","  <span class='kw'>if</span> !node: <span class='kw'>return</span> Node(val)","  <span class='kw'>if</span> val < node.val: node.left=insert(node.left,val)","  <span class='kw'>else if</span> val > node.val: node.right=insert(node.right,val)","  <span class='kw'>return</span> node","","<span class='kw'>function</span> <span class='fn'>search</span>(node, val):","  <span class='kw'>if</span> !node: <span class='kw'>return false</span>","  <span class='kw'>if</span> val==node.val: <span class='kw'>return true</span>","  <span class='kw'>if</span> val<node.val: <span class='kw'>return</span> search(node.left,val)","  <span class='kw'>return</span> search(node.right,val)"],
    info:"<b>Insert/Search:</b> O(log n) avg<br><b>Worst (skewed):</b> O(n)<br><b>Space:</b> O(n)",
    cases:["Inserting duplicate → ignored (strict BST invariant)","Sorted insertion → creates skewed tree, O(n) height","Delete node with two children → replaced by inorder successor","Cannot delete last node — tree must stay non-empty","Searching empty tree → returns false immediately"]},
  tree_trav:{name:"Tree Traversals",cat:"Tree",badge:"O(n)",desc:"Inorder (L-Root-R), Preorder (Root-L-R), Postorder (L-R-Root) with step animation.",type:"tree_trav",
    code:["<span class='kw'>function</span> <span class='fn'>inorder</span>(node):","  inorder(node.left)","  visit(node)   <span class='cm'>// Root</span>","  inorder(node.right)","","<span class='kw'>function</span> <span class='fn'>preorder</span>(node):","  visit(node)   <span class='cm'>// Root first</span>","  preorder(node.left)","  preorder(node.right)","","<span class='kw'>function</span> <span class='fn'>postorder</span>(node):","  postorder(node.left)","  postorder(node.right)","  visit(node)   <span class='cm'>// Root last</span>"],
    info:"<b>Inorder BST:</b> sorted output<br><b>Preorder:</b> serialize tree<br><b>Postorder:</b> delete tree",
    cases:["Empty tree → all traversals return empty list","Single node → all three return [root]","Inorder on BST → always sorted ascending","Skewed tree → recursion depth = n (stack risk)","Postorder used in expression trees: leaves before operators"]},
  fib:{name:"Fibonacci DP",cat:"Dynamic Programming",badge:"O(n)",desc:"Bottom-up DP table for Fibonacci showing optimal substructure.",type:"dp_fib",
    code:["<span class='kw'>function</span> <span class='fn'>fibonacci</span>(n):","  dp=array of size n+1","  dp[0]=0; dp[1]=1","  <span class='kw'>for</span> i=2 to n:","    dp[i]=dp[i-1]+dp[i-2]","    <span class='cm'>// each cell = sum of prev two</span>","  <span class='kw'>return</span> dp[n]"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(n) → O(1) optimized<br><b>Naive:</b> O(2ⁿ)",
    cases:["n=0 → dp[0]=0 (base case)","n=1 → dp[1]=1 (base case)","n>70 → overflows 64-bit int (use BigInt)","Only dp[i-1] and dp[i-2] needed → space reducible to O(1)"]},
  knapsack:{name:"0/1 Knapsack",cat:"Dynamic Programming",badge:"O(nW)",desc:"Maximize value within weight capacity. Classic 2D DP table.",type:"dp_ks",
    code:["<span class='kw'>function</span> <span class='fn'>knapsack</span>(W,wt,val,n):","  dp[n+1][W+1]=0","  <span class='kw'>for</span> i=1 to n:","    <span class='kw'>for</span> w=0 to W:","      <span class='kw'>if</span> wt[i]<=w:","        dp[i][w]=max(val[i]+dp[i-1][w-wt[i]], dp[i-1][w])","      <span class='kw'>else</span>: dp[i][w]=dp[i-1][w]","  <span class='kw'>return</span> dp[n][W]"],
    info:"<b>Time:</b> O(n·W)<br><b>Space:</b> O(n·W)<br><b>0/1:</b> Items cannot be split",
    cases:["W=0 → all dp values are 0, nothing fits","Item weight > W → that item is never selected","Fractional items needed → use Greedy Fractional Knapsack","Large W with small n → still tractable (pseudo-polynomial)"]},
  lcs:{name:"Longest Common Subseq.",cat:"Dynamic Programming",badge:"O(mn)",desc:"Longest subsequence present in both strings. Classic 2D DP.",type:"dp_lcs",
    code:["<span class='kw'>function</span> <span class='fn'>LCS</span>(s1,s2):","  dp[m+1][n+1]=0","  <span class='kw'>for</span> i=1 to m:","    <span class='kw'>for</span> j=1 to n:","      <span class='kw'>if</span> s1[i-1]==s2[j-1]: dp[i][j]=dp[i-1][j-1]+1","      <span class='kw'>else</span>: dp[i][j]=max(dp[i-1][j],dp[i][j-1])","  <span class='kw'>return</span> dp[m][n]"],
    info:"<b>Time:</b> O(m·n)<br><b>Space:</b> O(m·n)<br><b>Use:</b> Diff tools, DNA alignment",
    cases:["One empty string → LCS=0 (border cells stay 0)","Identical strings → LCS = full length","LCS ≠ substring — chars need not be contiguous","Multiple LCS of same length → DP finds one; backtrack to list all"]},
  binexp:{name:"Binary Exponentiation",cat:"Number Theory",badge:"O(log n)",desc:"Compute aⁿ mod m in O(log n) using fast power by squaring.",type:"binexp",
    code:["<span class='kw'>function</span> <span class='fn'>binExp</span>(a,b,mod):","  result=1; a=a%mod","  <span class='kw'>while</span> b>0:","    <span class='kw'>if</span> b&1: result=result*a%mod","    b=b>>1; a=a*a%mod","  <span class='kw'>return</span> result"],
    info:"<b>Time:</b> O(log n)<br><b>Space:</b> O(1)<br><b>Use:</b> Modular inverse, cryptography",
    cases:["b=0 → result=1 (anything to power 0)","a=0 → result=0 for b>0","mod=1 → result always 0","Without mod → intermediate values overflow for large a,b","Negative exponent → not handled; use modular inverse"]},
  xor:{name:"XOR — Find Unique",cat:"Number Theory",badge:"O(n)",desc:"Find the single element where every other appears twice using XOR self-inverse.",type:"xor",
    code:["<span class='kw'>function</span> <span class='fn'>findUnique</span>(arr):","  result=0","  <span class='kw'>for</span> x in arr:","    result ^= x","    <span class='cm'>// a^a=0  (pairs cancel)</span>","    <span class='cm'>// a^0=a  (unique stays)</span>","  <span class='kw'>return</span> result"],
    info:"<b>Time:</b> O(n)<br><b>Space:</b> O(1)<br><b>Key:</b> XOR is self-inverse",
    cases:["Empty array → stays 0, guard required","All elements appear twice (no unique) → result is 0","Multiple unique elements → technique won't isolate them","Works correctly with negative numbers (two's complement)"]},
  nim:{name:"Nim Game",cat:"Game Theory",badge:"XOR Strategy",desc:"Remove objects from heaps. Last to take wins. Optimal play via XOR.",type:"nim",
    code:["<span class='kw'>function</span> <span class='fn'>nimWin</span>(heaps):","  xorSum=0","  <span class='kw'>for</span> h in heaps: xorSum^=h","  <span class='cm'>// xorSum≠0 → current player wins</span>","  <span class='kw'>return</span> xorSum!=0","","<span class='kw'>function</span> <span class='fn'>nimMove</span>(heaps):","  xorSum=XOR of all heaps","  <span class='kw'>for</span> i,h in heaps:","    target=h^xorSum","    <span class='kw'>if</span> target<h: reduce heap[i] to target"],
    info:"<b>Losing pos:</b> XOR=0<br><b>Winning pos:</b> XOR≠0<br><b>Combine:</b> XOR of heap sizes",
    cases:["All heaps empty → game already over","Single heap of 1 → current player takes it and wins","XOR of all heaps=0 → first player loses with optimal play","Misère Nim (last-taker loses) → strategy flips only at end-game"]},
  grundy:{name:"Grundy Numbers",cat:"Game Theory",badge:"Sprague-Grundy",desc:"Compute nimber values for positions. Determines winner of any impartial game.",type:"grundy",
    code:["<span class='kw'>function</span> <span class='fn'>grundy</span>(n):","  G=array, G[0]=0","  <span class='kw'>for</span> i=1 to n:","    reachable=Set()","    <span class='kw'>for</span> move in getMoves(i):","      reachable.add(G[i-move])","    G[i]=mex(reachable)","    <span class='cm'>// mex=min excludant</span>","  <span class='kw'>return</span> G","<span class='cm'>// G[i]=0 → losing  G[i]>0 → winning</span>"],
    info:"<b>Theorem:</b> Any impartial game ≡ Nim heap<br><b>Combine:</b> XOR of Grundy values",
    cases:["G[0]=0 always (terminal = losing for mover)","Moves={1} → G[n]=n mod 2 (alternating W/L)","Moves={1,2} → G values cycle: 0,1,2,0,1,2,...","Combining games → XOR of individual Grundy values"]},
};

// SIDEBAR
// ═══════════════════════════════════════════
const CATS=[
  {key:"Sorting",icon:"⇅"},{key:"Array",icon:"▣"},{key:"Pathfinding",icon:"◎"},
  {key:"Graph",icon:"⬡",subcats:["Graph Traversal","Cycles"]},{key:"Tree",icon:"⌥"},
  {key:"Dynamic Programming",icon:"◈"},{key:"Number Theory",icon:"#"},{key:"Game Theory",icon:"♟"},
];

function buildSidebar(){
  const icons=document.getElementById('sb-icons');
  const list=document.getElementById('sb-list');
  CATS.forEach(cat=>{
    const allItems=Object.entries(ALGOS).filter(([,a])=>a.cat===cat.key);
    if(!allItems.length) return;
    const pill=document.createElement('div');
    pill.className='cat-icon-pill';pill.title=cat.key;pill.textContent=cat.icon;
    icons.appendChild(pill);
    const ch=document.createElement('div');ch.className='cat-header';
    ch.innerHTML=`${cat.icon} ${cat.key}`;list.appendChild(ch);
    if(cat.subcats){
      cat.subcats.forEach(subcat=>{
        const subitems=Object.entries(ALGOS).filter(([,a])=>a.cat===cat.key&&a.subcat===subcat);
        if(!subitems.length) return;
        const sh=document.createElement('div');sh.className='subcat-header';sh.textContent=subcat;list.appendChild(sh);
        subitems.forEach(([id,a])=>{
          const el=document.createElement('div');el.className='algo-item subcat-item';el.id='si-'+id;
          el.innerHTML=`<div class="dot"></div>${a.name}`;
          el.onclick=()=>loadAlgo(id);list.appendChild(el);
        });
      });
    } else {
      allItems.forEach(([id,a])=>{
        const el=document.createElement('div');el.className='algo-item';el.id='si-'+id;
        el.innerHTML=`<div class="dot"></div>${a.name}`;
        el.onclick=()=>loadAlgo(id);list.appendChild(el);
      });
    }
    const div=document.createElement('div');div.className='cat-divider';list.appendChild(div);
  });
}

let state={
  current:null,running:false,paused:false,speed:5,timer:null,
  steps:[],stepIdx:0,renderFn:null,arena:false,
  arr:[],states:[],
  grid:null,gridRows:16,gridCols:22,startCell:null,endCell:null,drawingWalls:false,gridMode:'wall',
  extra:{}
};
let _lastExplain='';

// ═══════════════════════════════════════════
// LOAD ALGO
// ═══════════════════════════════════════════
function loadAlgo(id){
  if(state.timer){clearTimeout(state.timer);state.timer=null;}
  state.running=false;state.arena=false;state.steps=[];state.stepIdx=0;
  state.current=id;
  document.querySelectorAll('.algo-item').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('si-'+id);if(si)si.classList.add('active');
  document.querySelectorAll('.cat-icon-pill').forEach(p=>p.classList.toggle('has-active',p.title===ALGOS[id].cat));
  document.getElementById('welcome').style.display='none';
  const av=document.getElementById('algo-view');av.style.display='flex';
  const a=ALGOS[id];
  document.getElementById('av-title').textContent=a.name;
  document.getElementById('av-badge').textContent=a.badge;
  document.getElementById('av-desc').textContent=a.desc;
  document.getElementById('av-code').innerHTML=a.code.map((l,i)=>`<div class="code-line" id="cl${i}">${l||'&nbsp;'}</div>`).join('');
  document.getElementById('av-info').innerHTML=a.info;
  // Edge cases
  const ep=document.getElementById('av-edges');
  if(a.cases&&a.cases.length){
    ep.style.display='block';
    ep.innerHTML='<div class="edge-title">⚠ Edge Cases</div>'+a.cases.map(c=>`<div class="edge-case">${c}</div>`).join('');
  } else ep.style.display='none';
  closeInputPanel();
  _lastExplain='';
  buildControls(id,a);
  buildViz(id,a);
}

function highlightCode(lines){
  document.querySelectorAll('.code-line').forEach(e=>e.classList.remove('highlight'));
  if(lines)lines.forEach(i=>{const el=document.getElementById('cl'+i);if(el)el.classList.add('highlight');});
}

// ═══════════════════════════════════════════
// INPUT PANEL
// ═══════════════════════════════════════════
function closeInputPanel(){
  const p=document.getElementById('input-panel');
  p.classList.remove('open');p.style.display='none';
  clearInputError();
  const b=document.getElementById('btn-input');if(b)b.classList.remove('active');
}
function toggleInputPanel(id){
  const p=document.getElementById('input-panel');
  const b=document.getElementById('btn-input');
  if(p.classList.contains('open')){closeInputPanel();return;}
  p.style.display='flex';p.classList.add('open');
  if(b)b.classList.add('active');
  buildInputPanel(id);
}
function showInputError(msg){const e=document.getElementById('input-error');e.textContent=msg;e.style.display='block';}
function clearInputError(){const e=document.getElementById('input-error');if(e){e.textContent='';e.style.display='none';}}
function parseInts(str){return str.split(',').map(s=>parseInt(s.trim(),10)).filter(n=>!isNaN(n));}
function addField(inner,lbl,id,ph,w,hint){
  const g=document.createElement('div');g.className='field-group';
  const l=document.createElement('label');l.textContent=lbl;l.setAttribute('for',id);
  const inp=document.createElement('input');inp.type='text';inp.id=id;inp.placeholder=ph;if(w)inp.style.width=w;
  g.appendChild(l);g.appendChild(inp);
  if(hint){const h=document.createElement('span');h.className='hint';h.textContent=hint;g.appendChild(h);}
  inner.appendChild(g);
}
function addApply(inner,fn){const b=document.createElement('button');b.className='apply-btn';b.textContent='✓ Apply';b.onclick=fn;inner.appendChild(b);}

function buildInputPanel(id){
  const a=ALGOS[id];
  const inner=document.getElementById('input-panel-inner');
  inner.innerHTML='';clearInputError();
  if(a.type==='sort'){
    addField(inner,'Array:','ci-arr','34,12,67,5,2,89,41','230px','comma-separated integers (max 60)');
    addApply(inner,()=>{
      const arr=parseInts(document.getElementById('ci-arr').value);
      if(arr.length<2){showInputError('Need at least 2 integers.');return;}
      if(arr.length>60){showInputError('Max 60 elements.');return;}
      clearInputError();
      state.arr=[...arr];state.states=arr.map(()=>({color:COLORS.default}));
      state.steps=genSortSteps(id,[...arr]);state.stepIdx=0;
      renderSort(state.arr,state.states);setStatus(`Loaded ${arr.length} elements`);
    });
  } else if(a.type==='array_sw'){
    addField(inner,'Array:','ci-arr','10,20,5,15,30,25','200px','integers comma-separated');
    addField(inner,'k:','ci-k','4','50px','window size');
    addApply(inner,()=>{
      const arr=parseInts(document.getElementById('ci-arr').value);
      const k=parseInt(document.getElementById('ci-k').value,10);
      if(arr.length<2){showInputError('Need at least 2 integers.');return;}
      if(isNaN(k)||k<1){showInputError('k must be ≥ 1');return;}
      if(k>arr.length){showInputError(`k(${k}) must be ≤ array length(${arr.length})`);return;}
      clearInputError();
      // Load custom data — flag so initArraySW won't overwrite with random
      state.arr=arr;
      state.extra._customSW=true;
      // Sync k control so initArraySW picks it up
      const kEl=document.getElementById('ctrl-sw-k');if(kEl)kEl.value=k;
      // Full reinit: clears steps, renders fresh, ready for Start
      state.running=false;clearTimeout(state.timer);state.steps=[];state.stepIdx=0;
      state.arena=false;
      const bA=document.getElementById('btn-arena');if(bA){bA.classList.remove('active');bA.textContent='🎮 Arena';}
      initArraySW();
      setStatus(`Loaded: n=${arr.length}, k=${k} — click ▶ Start`);
    });
  } else if(a.type==='array_tp'){
    addField(inner,'Sorted Array:','ci-arr','1,4,6,8,11,15','180px','will auto-sort');
    addField(inner,'Target:','ci-target','15','65px');
    addApply(inner,()=>{
      let arr=parseInts(document.getElementById('ci-arr').value);
      const target=parseInt(document.getElementById('ci-target').value,10);
      if(arr.length<2){showInputError('Need at least 2 integers.');return;}
      if(isNaN(target)){showInputError('Enter a valid target.');return;}
      arr=arr.sort((a,b)=>a-b);
      clearInputError();
      // Load custom data — flags prevent random overwrite on init
      state.arr=arr;
      state.extra._customTP=true;
      state.extra._customTarget=target;
      // Sync target control
      const tEl=document.getElementById('ctrl-tp-target');if(tEl)tEl.value=target;
      // Full reinit
      state.running=false;clearTimeout(state.timer);state.steps=[];state.stepIdx=0;
      state.arena=false;
      const bA=document.getElementById('btn-arena');if(bA){bA.classList.remove('active');bA.textContent='🎮 Arena';}
      initArrayTP();
      setStatus(`Loaded: [${arr.join(',')}] | Target=${target} — click ▶ Start`);
    });
  } else if(a.type==='array_kadane'){
    addField(inner,'Array:','ci-karr','-2,1,-3,4,-1,2,1,-5,4','240px','integers (mix pos & neg, max 30)');
    addApply(inner,()=>{
      const arr=parseInts(document.getElementById('ci-karr').value);
      if(arr.length<2){showInputError('Need at least 2 integers.');return;}
      if(arr.length>30){showInputError('Max 30 elements.');return;}
      clearInputError();
      state.arr=arr;state.extra._customKadane=true;
      state.running=false;clearTimeout(state.timer);state.steps=[];state.stepIdx=0;state.arena=false;
      const bA=document.getElementById('btn-arena');if(bA){bA.classList.remove('active');bA.textContent='🎮 Arena';}
      initKadane();
      setStatus(`Loaded: ${arr.length} elements — click ▶ Start`);
    });
  } else if(a.type==='array_bm'){
    addField(inner,'Array:','ci-bmarr','3,3,4,2,3,1,3,3,2','230px','must have a majority (>n/2 times)');
    addApply(inner,()=>{
      const arr=parseInts(document.getElementById('ci-bmarr').value);
      if(arr.length<1){showInputError('Need at least 1 integer.');return;}
      const freq={};arr.forEach(v=>{freq[v]=(freq[v]||0)+1;});
      const majority=Object.entries(freq).find(([,c])=>c>arr.length/2);
      if(!majority){showInputError('No majority element found — one value must appear more than n/2 times.');return;}
      clearInputError();
      state.arr=arr;state.extra._customBM=true;
      state.running=false;clearTimeout(state.timer);state.steps=[];state.stepIdx=0;state.arena=false;
      const bA=document.getElementById('btn-arena');if(bA){bA.classList.remove('active');bA.textContent='🎮 Arena';}
      initBoyerMoore();
      setStatus(`Loaded: ${arr.length} elements — click ▶ Start`);
    });
  } else if(a.type==='grid'){
    addField(inner,'Rows:','ci-rows','16','55px','6–28');
    addField(inner,'Cols:','ci-cols','22','55px','8–36');
    addApply(inner,()=>{
      const r=Math.min(28,Math.max(6,parseInt(document.getElementById('ci-rows').value,10)||16));
      const c=Math.min(36,Math.max(8,parseInt(document.getElementById('ci-cols').value,10)||22));
      state.gridRows=r;state.gridCols=c;
      clearInputError();initGrid(id);setStatus(`Grid ${r}×${c}`);
    });
  } else if(a.type==='graph'||a.type==='dsu'||a.type==='cycle_u'||a.type==='cycle_d'){
    addField(inner,'Nodes:','ci-nodes','8','55px','2–12');
    addField(inner,'Edges:','ci-edges','0-1,1-2,2-3','210px','e.g. 0-1,1-2,2-4');
    addApply(inner,()=>{
      const n=parseInt(document.getElementById('ci-nodes').value,10);
      if(isNaN(n)||n<2||n>12){showInputError('Node count must be 2–12.');return;}
      const edgePairs=document.getElementById('ci-edges').value.split(',').map(s=>{const p=s.trim().split('-').map(Number);return p.length===2&&!isNaN(p[0])&&!isNaN(p[1])?p:null;}).filter(Boolean);
      if(edgePairs.some(([a,b])=>a>=n||b>=n)){showInputError('Edge index out of range.');return;}
      clearInputError();
      const algo=ALGOS[id].algo||'bfs';
      const cx=350,cy=190,rx=190,ry=135;
      const nodes=Array.from({length:n},(_,i)=>({id:i,x:cx+Math.cos(i/n*2*Math.PI-Math.PI/2)*rx,y:cy+Math.sin(i/n*2*Math.PI-Math.PI/2)*ry,label:algo==='topo'?String.fromCharCode(65+i):i}));
      if(algo==='topo'){
        const layers=Array.from({length:n},(_,i)=>[i]);
        nodes.forEach((nd,i)=>{nd.x=80+(i+1)*(580/(n+1));nd.y=100+Math.floor(i*55/n)*2;});
      }
      state.extra.graphNodes=nodes;state.extra.graphEdges=edgePairs;state.extra.graphAlgo=algo;
      state.steps=[];state.stepIdx=0;
      if(a.type==='cycle_u'){genCycleUSteps();renderCycleU({color:Array(n).fill(0),current:-1,parent:{},backEdge:null,done:false,hasCycle:false});}
      else if(a.type==='cycle_d'){genCycleDSteps();renderCycleD({color:Array(n).fill(0),current:-1,backEdge:null,done:false,hasCycle:false});}
      else{renderGraph([],[],null,[]);}
      setStatus(`${n} nodes, ${edgePairs.length} edges`);
    });
  } else if(a.type==='tree'||a.type==='tree_trav'){
    addField(inner,'Values:','ci-vals','50,30,70,20,40,60,80','240px','comma-separated (max 20)');
    addApply(inner,()=>{
      const vals=parseInts(document.getElementById('ci-vals').value);
      if(vals.length<1){showInputError('Need at least 1 integer.');return;}
      if(vals.length>20){showInputError('Max 20 nodes.');return;}
      clearInputError();
      state.extra.treeRoot=null;
      vals.forEach(v=>{state.extra.treeRoot=bstInsertNode(state.extra.treeRoot,v);});
      renderTree(new Set(),[]);setStatus(`Tree: ${vals.length} nodes`);
    });
  } else if(a.type==='dp_fib'){
    addField(inner,'N:','ci-n','15','60px','1–25');
    addApply(inner,()=>{
      const n=parseInt(document.getElementById('ci-n').value,10);
      if(isNaN(n)||n<1||n>25){showInputError('N must be 1–25.');return;}
      clearInputError();
      state.extra.fibN=n;state.extra.fibDP=Array(n+1).fill(null);
      renderFib([],null);setStatus(`N=${n}`);
    });
  } else if(a.type==='dp_ks'){
    addField(inner,'Capacity W:','ci-ksW','8','55px');
    addField(inner,'Items (w:v):','ci-ksItems','2:3,3:4,4:5,5:6','190px','weight:value pairs');
    addApply(inner,()=>{
      const W=parseInt(document.getElementById('ci-ksW').value,10);
      if(isNaN(W)||W<1){showInputError('W must be ≥ 1');return;}
      const items=document.getElementById('ci-ksItems').value.split(',').map(s=>{const p=s.trim().split(':').map(Number);return p.length===2&&!isNaN(p[0])&&!isNaN(p[1])?{w:p[0],v:p[1]}:null;}).filter(Boolean);
      if(!items.length){showInputError('Format: w1:v1,w2:v2,...');return;}
      clearInputError();
      state.extra.ksW=W;state.extra.ksN=items.length;
      state.extra.ksWts=items.map(i=>i.w);state.extra.ksVals=items.map(i=>i.v);
      state.extra.ksDP=Array.from({length:items.length+1},()=>Array(W+1).fill(0));
      renderKS(0,0);setStatus(`${items.length} items W=${W}`);
    });
  } else if(a.type==='dp_lcs'){
    addField(inner,'String 1:','ci-s1','ABCBDAB','130px');
    addField(inner,'String 2:','ci-s2','BDCAB','130px','max 12 chars each');
    addApply(inner,()=>{
      const s1=(document.getElementById('ci-s1').value||'').toUpperCase().slice(0,12);
      const s2=(document.getElementById('ci-s2').value||'').toUpperCase().slice(0,12);
      if(!s1||!s2){showInputError('Both strings required.');return;}
      clearInputError();
      state.extra.lcsS1=s1;state.extra.lcsS2=s2;
      state.extra.lcsDP=Array.from({length:s1.length+1},()=>Array(s2.length+1).fill(0));
      renderLCS(0,0);setStatus(`"${s1}" vs "${s2}"`);
    });
  } else if(a.type==='binexp'){
    addField(inner,'a:','ci-bea','2','50px');
    addField(inner,'b (exp):','ci-beb','10','50px');
    addField(inner,'mod:','ci-bemod','1000','65px');
    addApply(inner,()=>{
      const a=parseInt(document.getElementById('ci-bea').value,10),b=parseInt(document.getElementById('ci-beb').value,10),mod=parseInt(document.getElementById('ci-bemod').value,10);
      if(isNaN(a)||isNaN(b)||isNaN(mod)||mod<1){showInputError('All fields required, mod ≥ 1.');return;}
      clearInputError();
      state.extra.beA=a;state.extra.beB=b;state.extra.beMod=mod;
      renderBinExp([],null);setStatus(`${a}^${b} mod ${mod}`);
    });
  } else if(a.type==='xor'){
    addField(inner,'Array:','ci-xarr','2,3,2,5,3','200px','one unique element');
    addApply(inner,()=>{
      const arr=parseInts(document.getElementById('ci-xarr').value);
      if(arr.length<1){showInputError('At least one element required.');return;}
      const freq={};arr.forEach(v=>{freq[v]=(freq[v]||0)+1;});
      const odds=Object.values(freq).filter(c=>c%2!==0).length;
      if(odds!==1){showInputError(`Array must have exactly ONE unique element. Found ${odds}.`);return;}
      clearInputError();
      state.extra.xorArr=arr;renderXOR([],0,null);setStatus(`${arr.length} elements`);
    });
  } else if(a.type==='nim'){
    addField(inner,'Heap sizes:','ci-heaps','3,5,7','150px','positive integers');
    addApply(inner,()=>{
      const heaps=parseInts(document.getElementById('ci-heaps').value).filter(h=>h>0);
      if(!heaps.length){showInputError('Need at least 1 positive heap.');return;}
      clearInputError();
      state.extra.nimHeaps=[...heaps];state.extra.nimHistory=[];
      renderNim();setStatus(`Heaps: [${heaps}]`);
    });
  } else if(a.type==='grundy'){
    addField(inner,'N:','ci-gn','8','55px','max 15');
    addField(inner,'Moves:','ci-gmoves','1,2','90px','e.g. 1,2,3');
    addApply(inner,()=>{
      const n=parseInt(document.getElementById('ci-gn').value,10);
      const moves=parseInts(document.getElementById('ci-gmoves').value).filter(m=>m>0);
      if(isNaN(n)||n<1||n>15){showInputError('N must be 1–15.');return;}
      if(!moves.length){showInputError('At least one move required.');return;}
      clearInputError();
      state.extra.grundyN=n;state.extra.grundyMoves=moves;state.extra.grundyG=Array(n+1).fill(null);
      renderGrundy([],null);setStatus(`N=${n} moves={${moves}}`);
    });
  }
}


// ═══════════════════════════════════════════
// CONTROLS BUILDER
// ═══════════════════════════════════════════
function mkCtrl(html){const d=document.createElement('div');d.className='ctrl-group';d.innerHTML=html;return d;}
function mkSep(){const d=document.createElement('div');d.className='ctrl-sep';return d;}
function mkBtn(label,cls,fn,bid){const b=document.createElement('button');b.className='btn '+cls;b.innerHTML=label;b.onclick=fn;if(bid)b.id=bid;return b;}
function setStatus(s,running=false,err=false){const b=document.getElementById('status-badge');if(!b)return;b.textContent=s;b.className='status-badge'+(running?' running':err?' error':'');}
function pauseViz(){
  if(!state.running)return;
  state.running=false;state.paused=true;clearTimeout(state.timer);setStatus('Paused');
  const btn=document.getElementById('btn-start');
  if(btn){btn.dataset.origLabel=btn.innerHTML;btn.innerHTML='▶ Resume';}
}
function _restoreStartBtn(){
  const btn=document.getElementById('btn-start');
  if(btn&&btn.dataset.origLabel){btn.innerHTML=btn.dataset.origLabel;delete btn.dataset.origLabel;}
}
function handleStartBtn(){
  const a=ALGOS[state.current];if(!a||state.running)return;
  const resuming=!!(state.paused&&state.steps&&state.steps.length>0&&state.stepIdx<state.steps.length);
  state.paused=false;_restoreStartBtn();
  if(a.type==='grid'){startGridViz(state.current,resuming);}
  else{startViz(resuming);}
}

// Arena controls — appended to every algo
function appendArena(ctrl){
  ctrl.appendChild(mkSep());
  ctrl.appendChild(mkBtn('🎮 Arena','btn-arena',toggleArena,'btn-arena'));
  ctrl.appendChild(mkBtn('⏮','btn-step',stepBack));
  ctrl.appendChild(mkBtn('⏭','btn-step',stepFwd));
}

function buildControls(id,a){
  const ctrl=document.getElementById('av-controls');ctrl.innerHTML='';
  ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>Speed</span><input type='range' min='1' max='10' value='${state.speed}' id='ctrl-speed'>`));
  document.getElementById('ctrl-speed').oninput=e=>{state.speed=+e.target.value;};

  if(a.type==='sort'){
    ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>Size</span><input type='number' min='5' max='60' value='30' id='ctrl-size' style='width:58px'>`));
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>initSort(id)));
  } else if(a.type==='array_sw'){
    ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>k =</span><input type='number' min='1' max='30' value='4' id='ctrl-sw-k' style='width:52px'>`));
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='array_tp'){
    ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>Target</span><input type='number' id='ctrl-tp-target' placeholder='auto' style='width:70px'>`));
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('↺ New','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='array_kadane'){
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='array_bm'){
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='grid'){
    ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>Rows</span><input type='number' min='6' max='28' value='${state.gridRows}' id='ctrl-gr' style='width:48px'>`));
    ctrl.appendChild(mkCtrl(`<span class='ctrl-label'>Cols</span><input type='number' min='8' max='36' value='${state.gridCols}' id='ctrl-gc' style='width:48px'>`));
    ctrl.appendChild(mkBtn('Apply','btn-secondary',()=>applyGridSize(id)));
    ctrl.appendChild(mkSep());
    ctrl.appendChild(mkBtn('✏ Wall','btn-mode active',()=>setGridMode('wall',id),'gm-wall'));
    ctrl.appendChild(mkBtn('🟢 Start','btn-mode',()=>setGridMode('start',id),'gm-start'));
    ctrl.appendChild(mkBtn('🔴 End','btn-mode',()=>setGridMode('end',id),'gm-end'));
    ctrl.appendChild(mkSep());
    ctrl.appendChild(mkBtn('▶ Visualize','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('⏸ Pause','btn-secondary',pauseViz));
    ctrl.appendChild(mkBtn('Clear','btn-secondary',()=>clearGridWalls(id)));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>initGrid(id)));
  } else if(a.type==='graph'){
    ctrl.appendChild(mkBtn('▶ Start','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('↺ New','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='dsu'){
    ctrl.appendChild(mkBtn('▶ Run Unions','btn-primary',()=>handleStartBtn(),'btn-start'));
    ctrl.appendChild(mkBtn('↺ Reset','btn-danger',()=>buildViz(id,a)));
  } else if(a.type==='tree'){
    ctrl.appendChild(mkCtrl(`<input type='number' id='ctrl-tval' placeholder='value' style='width:70px'>`));
    ctrl.appendChild(mkBtn('Insert','btn-primary',()=>treeInsert()));
    ctrl.appendChild(mkBtn('Search','btn-secondary',()=>treeSearch()));
    ctrl.appendChild(mkBtn('Delete','btn-danger',()=>treeDelete()));
    ctrl.appendChild(mkBtn('↺ Reset','btn-secondary',()=>buildViz(id,a)));
  } else if(a.type==='tree_trav'){
    ctrl.appendChild(mkCtrl(`<input type='number' id='ctrl-tval' placeholder='value' style='width:70px'>`));
    ctrl.appendChild(mkBtn('Insert','btn-secondary',()=>treeInsert()));
    ctrl.appendChild(mkBtn('Delete','btn-danger',()=>treeDelete()));
    ctrl.appendChild(mkBtn('Inorder','btn-primary',()=>startTraversal('inorder')));
    ctrl.appendChild(mkBtn('Preorder','btn-secondary',()=>startTraversal('preorder')));
    ctrl.appendChild(mkBtn('Postorder','btn-secondary',()=>startTraversal('postorder')));

// ARENA — Universal Step-Through
// ═══════════════════════════════════════════
function toggleArena(){
  state.arena=!state.arena;
  const b=document.getElementById('btn-arena');
  if(state.arena){
    // Turning ON: freeze auto-play, enter stepping mode
    state.running=false;clearTimeout(state.timer);
    if(b){b.classList.add('active');b.textContent='🎮 ON';}
    const a=ALGOS[state.current];
    // Ensure steps exist (they should already, but guard for edge cases)
    if(!state.steps||!state.steps.length) regenSteps(a);
    setStatus(`Arena — step ${state.stepIdx||0} / ${(state.steps||[]).length}`);
  } else {
    // Turning OFF: resume animation from wherever we paused
    if(b){b.classList.remove('active');b.textContent='🎮 Arena';}
    const a=ALGOS[state.current];
    if(a.type==='grid'){
      resumeGridViz(state.current);
    } else if(state.steps&&state.steps.length&&state.stepIdx<state.steps.length){
      startViz(true); // resume=true → keeps stepIdx, no regeneration
    } else {
      setStatus('Done ✓');
    }
  }
}
function stepFwd(){
  if(!state.steps||!state.steps.length){
    const a=ALGOS[state.current];regenSteps(a);
    if(!state.steps||!state.steps.length)return;
  }
  if(state.stepIdx>=state.steps.length)return;
  if(!state.arena){
    state.arena=true;state.running=false;clearTimeout(state.timer);
    const b=document.getElementById('btn-arena');if(b){b.classList.add('active');b.textContent='🎮 ON';}
  }
  const fr=state.steps[state.stepIdx++];
  if(state.renderFn)state.renderFn(fr);
  highlightCode(fr.code||[]);
  if(fr.explain)updateGraphExplain(fr.explain,fr.pathStr||'');
  setStatus(`Step ${state.stepIdx} / ${state.steps.length}`);
}
function stepBack(){
  if(!state.steps||state.stepIdx<=0)return;
  if(!state.arena){
    state.arena=true;state.running=false;clearTimeout(state.timer);
    const b=document.getElementById('btn-arena');if(b){b.classList.add('active');b.textContent='🎮 ON';}
  }
  state.stepIdx=Math.max(0,state.stepIdx-1);
  const fr=state.steps[state.stepIdx];
  if(state.renderFn)state.renderFn(fr);
  highlightCode(fr.code||[]);
  if(fr.explain)updateGraphExplain(fr.explain,fr.pathStr||'');
  setStatus(`Step ${state.stepIdx+1} / ${state.steps.length}`);
}
