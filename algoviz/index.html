<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FM0VFFQFRD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-FM0VFFQFRD');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoViz — Algorithm Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="topbar">
  <div class="logo">Algo<span>Viz</span></div>
  <div class="tagline">Interactive Algorithm Visualizer &bull; 25 Algorithms</div>
  <div class="sb-hint"><span class="sb-hint-arrow">›</span> hover left edge to browse</div>
</div>

<div class="layout">
  <div class="sidebar-wrap" id="sidebar-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sb-icons" id="sb-icons"></div>
      <div class="sb-list" id="sb-list"></div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⬡</div>
      <h2>Pick an Algorithm</h2>
      <p>Hover the left edge → choose from 25 algorithms. Every visualizer supports <b style="color:var(--purple)">Arena mode</b> — step forward &amp; backward through any animation.</p>
    </div>

    <div id="algo-view" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="algo-header">
        <div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="algo-title" id="av-title"></div>
            <div class="algo-badge" id="av-badge"></div>
          </div>
          <div class="algo-desc" id="av-desc"></div>
        </div>
      </div>
      <div class="controls" id="av-controls"></div>
      <div id="input-panel">
        <div class="input-panel-inner" id="input-panel-inner"></div>
        <div class="input-error" id="input-error"></div>
      </div>
      <div class="viz-body">
        <div class="canvas-area" id="av-canvas" style="flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12px;"></div>
        <div class="code-panel">
          <div class="code-panel-head">Pseudocode</div>
          <div class="code-content" id="av-code"></div>
          <div class="info-panel" id="av-info"></div>
          <div class="edge-panel" id="av-edges" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Load order matters: state → registry → algos → core (boots last) -->
<script src="js/state.js"></script>
<script src="js/registry.js"></script>
<script src="js/algos/sort.js"></script>
<script src="js/algos/array.js"></script>
<script src="js/algos/grid.js"></script>
<script src="js/algos/graph.js"></script>
<script src="js/algos/tree.js"></script>
<script src="js/algos/dp.js"></script>
<script src="js/algos/number_theory.js"></script>
<script src="js/algos/game_theory.js"></script>
<script src="js/algos/cycles.js"></script>
<script src="js/core.js"></script>

</body>
</html>
